<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>艾瑟瑞亞百科 · Aetheria Wiki</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Literata:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #10151a;
    --bg-panel: #161d22;
    --bg-panel-2: #1b2329;
    --line: #2a3339;
    --ink: #e9e4d6;
    --ink-dim: #97a29e;
    --gold: #c9a15c;
    --gold-soft: rgba(201,161,92,.16);
    --ember: #d9622b;
    --lunar: #8fa8c9;
    --abyss: #a274d1;
    --bloom: #d68fc9;
    --trench: #4fb3bf;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Literata',serif;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--gold-soft);}

  #app{display:flex;min-height:100vh;}

  /* ---------- Sidebar ---------- */
  #sidebar{
    width:270px;flex:0 0 270px;background:var(--bg-panel);
    border-right:1px solid var(--line);
    padding:22px 16px 40px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 6px 18px;border-bottom:1px solid var(--line);margin-bottom:16px;}
  .brand-mark{width:30px;height:30px;flex:0 0 30px;}
  .brand-title{font-family:'Spectral',serif;font-weight:700;font-size:17px;letter-spacing:.02em;}
  .brand-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-dim);letter-spacing:.08em;text-transform:uppercase;}

  #search-box{position:relative;margin-bottom:20px;}
  #search-input{
    width:100%;background:var(--bg-panel-2);border:1px solid var(--line);border-radius:6px;
    color:var(--ink);font-family:'Literata',serif;font-size:13.5px;padding:9px 12px;outline:none;
  }
  #search-input:focus{border-color:var(--gold);}
  #search-results{
    position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg-panel-2);
    border:1px solid var(--line);border-radius:6px;overflow:hidden;z-index:20;display:none;
    max-height:280px;overflow-y:auto;
  }
  #search-results.show{display:block;}
  .sr-item{padding:8px 12px;font-size:13px;border-bottom:1px solid var(--line);cursor:pointer;}
  .sr-item:last-child{border-bottom:none;}
  .sr-item:hover{background:var(--gold-soft);}
  .sr-item small{display:block;color:var(--ink-dim);font-family:'IBM Plex Mono',monospace;font-size:9.5px;margin-top:2px;text-transform:uppercase;letter-spacing:.06em;}

  .nav-group{margin-bottom:4px;}
  .nav-group-title{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink-dim);padding:14px 8px 6px;
  }
  .nav-link{
    display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;font-size:13.5px;
    color:var(--ink-dim);cursor:pointer;line-height:1.4;
  }
  .nav-link:hover{background:var(--bg-panel-2);color:var(--ink);}
  .nav-link.active{background:var(--gold-soft);color:var(--gold);}
  .dot{width:7px;height:7px;border-radius:50%;flex:0 0 7px;background:var(--ink-dim);}

  /* ---------- Main ---------- */
  #main{flex:1;min-width:0;}
  #topbar{
    position:sticky;top:0;z-index:10;background:rgba(16,21,26,.85);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);padding:12px 40px;font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;color:var(--ink-dim);letter-spacing:.03em;
  }
  #topbar a{color:var(--gold);}
  #content{max-width:900px;margin:0 auto;padding:44px 40px 100px;}

  .page-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--domain-color,var(--gold));margin-bottom:10px;}
  h1.page-title{font-family:'Spectral',serif;font-size:38px;font-weight:700;line-height:1.15;margin:0 0 6px;}
  .page-alt{font-family:'Literata',serif;font-style:italic;color:var(--ink-dim);font-size:15px;margin-bottom:26px;}

  .infobox{
    float:right;width:280px;margin:0 0 20px 28px;background:var(--bg-panel);border:1px solid var(--line);
    border-radius:8px;overflow:hidden;
  }
  .infobox-head{background:var(--domain-color,var(--gold));color:#10151a;font-family:'Spectral',serif;font-weight:700;font-size:14.5px;padding:10px 14px;}
  .infobox-row{padding:9px 14px;border-bottom:1px solid var(--line);font-size:12.5px;}
  .infobox-row:last-child{border-bottom:none;}
  .infobox-label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);margin-bottom:3px;}
  .infobox-value{line-height:1.5;}
  .infobox-value a.wl{color:var(--domain-color,var(--gold));border-bottom:1px dotted currentColor;}

  article{font-size:16px;line-height:1.85;color:var(--ink);}
  article p{margin:0 0 18px;}
  article h2{font-family:'Spectral',serif;font-size:23px;font-weight:600;margin:36px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line);clear:none;}
  article h3{font-family:'Spectral',serif;font-size:18px;font-weight:600;margin:24px 0 10px;color:var(--domain-color,var(--gold));}
  article ul,article ol{padding-left:22px;margin:0 0 18px;}
  article li{margin-bottom:7px;}
  a.wl{color:var(--gold);border-bottom:1px dotted rgba(201,161,92,.5);}
  a.wl:hover{color:var(--ink);border-color:var(--ink);}
  .tag{
    display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;
    padding:3px 9px;border-radius:99px;border:1px solid var(--line);color:var(--ink-dim);margin:2px 6px 2px 0;
  }

  table.wiki-table{width:100%;border-collapse:collapse;margin:0 0 22px;font-size:14px;}
  table.wiki-table th,table.wiki-table td{border:1px solid var(--line);padding:9px 12px;text-align:left;vertical-align:top;}
  table.wiki-table th{background:var(--bg-panel);font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-dim);}

  blockquote{
    margin:24px 0;padding:14px 20px;border-left:3px solid var(--domain-color,var(--gold));
    background:var(--bg-panel);font-style:italic;color:var(--ink-dim);border-radius:0 6px 6px 0;
  }

  .domain-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:26px 0;clear:both;}
  .domain-card{
    background:var(--bg-panel);border:1px solid var(--line);border-radius:8px;padding:16px;cursor:pointer;
    border-top:3px solid var(--card-color,var(--gold));
  }
  .domain-card:hover{background:var(--bg-panel-2);}
  .domain-card h4{font-family:'Spectral',serif;margin:0 0 6px;font-size:16px;color:var(--card-color,var(--gold));}
  .domain-card p{margin:0;font-size:12.5px;color:var(--ink-dim);line-height:1.5;}

  #cosmology{width:100%;max-width:560px;display:block;margin:10px auto 30px;}
  #cosmology .node{cursor:pointer;}
  #cosmology text{font-family:'Spectral',serif;fill:var(--ink);}
  #cosmology .node:hover circle{filter:brightness(1.3);}
  #cosmology .label-sm{font-family:'IBM Plex Mono',monospace;font-size:9px;fill:var(--ink-dim);}

  .see-also{margin-top:44px;padding-top:20px;border-top:1px solid var(--line);}
  .see-also-title{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:10px;}

  .timeline{border-left:2px solid var(--line);margin:20px 0 0 6px;padding-left:24px;}
  .tl-item{position:relative;margin-bottom:26px;}
  .tl-item::before{content:'';position:absolute;left:-30px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--gold);}
  .tl-era{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--gold);letter-spacing:.04em;margin-bottom:4px;}
  .tl-title{font-family:'Spectral',serif;font-weight:600;font-size:17px;margin-bottom:5px;}

  #mobile-toggle{display:none;}
  @media(max-width:860px){
    #sidebar{position:fixed;left:-280px;z-index:50;transition:left .2s;box-shadow:0 0 40px rgba(0,0,0,.5);}
    #sidebar.open{left:0;}
    #mobile-toggle{
      display:block;position:fixed;bottom:20px;right:20px;z-index:60;width:48px;height:48px;border-radius:50%;
      background:var(--gold);color:#10151a;border:none;font-size:20px;cursor:pointer;
    }
    #content{padding:30px 20px 100px;}
    .infobox{float:none;width:100%;margin:0 0 24px;}
    h1.page-title{font-size:29px;}
  }
</style>
</head>
<body>
<div id="app">

  <aside id="sidebar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="none" stroke="#c9a15c" stroke-width="1.5"/><path d="M20 8 L20 32 M12 15 L28 25 M28 15 L12 25" stroke="#c9a15c" stroke-width="1.2"/><circle cx="20" cy="20" r="4" fill="#c9a15c"/></svg>
      <div>
        <div class="brand-title">艾瑟瑞亞百科</div>
        <div class="brand-sub">Aetheria Compendium</div>
      </div>
    </div>

    <div id="search-box">
      <input id="search-input" type="text" placeholder="搜尋詞條、種族、地域…">
      <div id="search-results"></div>
    </div>

    <nav id="nav-tree"></nav>
  </aside>

  <button id="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

  <main id="main">
    <div id="topbar"></div>
    <div id="content"></div>
  </main>

</div>

<script>
/* ============================================================
   DATA
   ============================================================ */
const DOMAIN_COLOR = {
  ember:'var(--ember)', lunar:'var(--lunar)', abyss:'var(--abyss)', bloom:'var(--bloom)', trench:'var(--trench)', null:'var(--gold)'
};

const PAGES = {

/* ---------------- 總覽 ---------------- */
home: {
  title:'艾瑟瑞亞', category:'總覽', domain:null, tags:['總覽','世界樹','宇宙觀'],
  alt:'Aetheria · 浮空大陸奇幻世界',
  body:`
  <p><b>艾瑟瑞亞</b>是一座環繞無盡雲海漂浮的巨大大陸,其存在的根基是中央的<a class="wl" href="#magic-system">魔力循環系統</a>——由世界樹
  <a class="wl" href="#creature-titan">艾瑟瑞姆</a>吸收五大生態域的原始魔力、加以轉化,再回饋予大陸上的萬千生靈。這是一個高魔力、
  情慾與生命力被視為魔法根本燃料的世界。</p>

  <h2>宇宙觀</h2>
  <p>大陸的一切魔力都以世界樹為心臟,呈放射狀連結五大<a class="wl" href="#magic-system">生態域</a>。點選下方圖示可前往各域詞條。</p>

  <svg id="cosmology" viewBox="0 0 560 480">
    <g stroke="#2a3339" stroke-width="1.4">
      <line x1="280" y1="240" x2="280" y2="70"/>
      <line x1="280" y1="240" x2="460" y2="150"/>
      <line x1="280" y1="240" x2="460" y2="330"/>
      <line x1="280" y1="240" x2="280" y2="410"/>
      <line x1="280" y1="240" x2="100" y2="330"/>
      <line x1="280" y1="240" x2="100" y2="150"/>
    </g>
    <g class="node" onclick="location.hash='creature-titan'">
      <circle cx="280" cy="240" r="34" fill="#c9a15c"/>
      <text x="280" y="245" font-size="13" text-anchor="middle" font-weight="600">世界樹</text>
    </g>
    <g class="node" onclick="location.hash='domain-ember'">
      <circle cx="280" cy="70" r="26" fill="#d9622b"/>
      <text x="280" y="75" font-size="11" text-anchor="middle" fill="#10151a" font-weight="600">炙炎</text>
      <text x="280" y="42" class="label-sm" text-anchor="middle">EMBER PEAKS</text>
    </g>
    <g class="node" onclick="location.hash='domain-lunar'">
      <circle cx="460" cy="150" r="26" fill="#8fa8c9"/>
      <text x="460" y="155" font-size="11" text-anchor="middle" fill="#10151a" font-weight="600">月影</text>
      <text x="460" y="120" class="label-sm" text-anchor="middle">LUNAR WOODS</text>
    </g>
    <g class="node" onclick="location.hash='domain-abyss'">
      <circle cx="460" cy="330" r="26" fill="#a274d1"/>
      <text x="460" y="335" font-size="11" text-anchor="middle" fill="#10151a" font-weight="600">永夜</text>
      <text x="460" y="365" class="label-sm" text-anchor="middle">ABYSSAL DEPTHS</text>
    </g>
    <g class="node" onclick="location.hash='domain-bloom'">
      <circle cx="280" cy="410" r="26" fill="#d68fc9"/>
      <text x="280" y="415" font-size="11" text-anchor="middle" fill="#10151a" font-weight="600">晶夢</text>
      <text x="280" y="445" class="label-sm" text-anchor="middle">CRYSTAL MEADOWS</text>
    </g>
    <g class="node" onclick="location.hash='domain-trench'">
      <circle cx="100" cy="330" r="26" fill="#4fb3bf"/>
      <text x="100" y="335" font-size="11" text-anchor="middle" fill="#10151a" font-weight="600">深海</text>
      <text x="100" y="365" class="label-sm" text-anchor="middle">ABYSSAL TRENCHES</text>
    </g>
    <g class="node" onclick="location.hash='domain-lunar'">
      <circle cx="100" cy="150" r="26" fill="#8fa8c9" opacity="0"/>
    </g>
  </svg>

  <h2>五大生態域</h2>
  <div class="domain-cards">
    <div class="domain-card" style="--card-color:var(--ember)" onclick="location.hash='domain-ember'"><h4>炙炎山脈</h4><p>火山與熔岩,龍女與炎狐的家園。</p></div>
    <div class="domain-card" style="--card-color:var(--lunar)" onclick="location.hash='domain-lunar'"><h4>月影古林</h4><p>隨月相變色的古木森林,狼女與月光精靈棲居。</p></div>
    <div class="domain-card" style="--card-color:var(--abyss)" onclick="location.hash='domain-abyss'"><h4>永夜深淵</h4><p>晶石發光的地底洞窟,魅魔與黑暗精靈的領地。</p></div>
    <div class="domain-card" style="--card-color:var(--bloom)" onclick="location.hash='domain-bloom'"><h4>晶夢花海</h4><p>漂浮的夢幻花島,花精與樹精的故鄉。</p></div>
    <div class="domain-card" style="--card-color:var(--trench)" onclick="location.hash='domain-trench'"><h4>深海裂隙</h4><p>高壓深海與發光珊瑚宮殿,海妖的疆域。</p></div>
  </div>

  <h2>快速導覽</h2>
  <ul>
    <li><a class="wl" href="#creation-myth">創世神話</a> —— 太初二力、世界樹之夢,以及各族的異本傳說</li>
    <li><a class="wl" href="#magic-system">魔力循環系統</a> —— 吸收、轉化、分配、淨化、回饋的五階段循環</li>
    <li><a class="wl" href="#history">歷史大事記</a> —— 從紀元0創世到當前紀元6230新生代</li>
    <li><a class="wl" href="#migration">跨域遷徙路線</a> —— 四季遷徙與七年一度的世界樹開花季</li>
    <li><a class="wl" href="#economy">經濟與貿易</a> —— 魔力結晶通貨與五域特產</li>
    <li><a class="wl" href="#transit-network">大陸交通網絡</a> —— 雲海渡口、根域隧道、天穹古道</li>
    <li><a class="wl" href="#unclaimed-territories">未歸屬地帶</a> —— 雲隙荒境與影裔殘部盤據的未圖之境</li>
    <li><a class="wl" href="#appendix-overview">附錄總覽</a> —— 譜系、編年表、曆法、語言、神器等參考工具彙整</li>
  </ul>
  `
},

/* ---------------- 人物與譜系 ---------------- */
'royal-lineages':{
  title:'王室譜系', category:'人物與譜系', domain:null, tags:['譜系','君王','王朝','世系'],
  alt:'Royal Lineages of Aetheria',
  body:`
  <p>艾瑟瑞亞並非所有政體都採世襲制,但三大主要王朝——<a class="wl" href="#domain-ember">炙炎山脈</a>的熔焰王朝、
  <a class="wl" href="#domain-abyss">永夜深淵</a>的契約王朝與黑淵母邦——皆有清楚可考的世系傳承,是理解各域政治延續性的關鍵。</p>

  <h2><a class="wl" href="#nation-pyraxis">熔焰王朝</a>(龍女)</h2>
  <p>始於紀元1200<a class="wl" href="#event-sky-war">天穹之戰</a>後,由戰爭英雄統一<a class="wl" href="#race-dragonkin">龍女</a>氏族而建立。</p>
  <table class="wiki-table">
    <tr><th>代序</th><th>稱號/名諱</th><th>在位期間</th><th>事蹟</th></tr>
    <tr><td>初代</td><td><a class="wl" href="#char-ignis">伊格妮絲一世「破天者」</a><br>Ignis I, the Skybreaker</td><td>紀元1200年後即位</td><td>領導龍女參與天穹之戰,戰後統一氏族,建立熔焰王國雛形</td></tr>
    <tr><td>第15代</td><td><a class="wl" href="#char-vyra">微拉女王</a><br>Queen Vyra</td><td>紀元3780前後</td><td>代表熔焰王國簽署<a class="wl" href="#event-grand-concord">大交融協定</a></td></tr>
    <tr><td>第29代</td><td><a class="wl" href="#char-camilla">卡蜜拉女王</a><br>Queen Camilla</td><td>紀元5890前後</td><td>領軍參與五域聯合鎮壓「<a class="wl" href="#history">影之叛亂</a>」</td></tr>
    <tr><td>第38代・現任</td><td><a class="wl" href="#char-feyla">妃嵐女王</a><br>Queen Feyla</td><td>紀元6230(當前)</td><td>新生代年輕統治者,面臨傳統與革新衝突的當代挑戰</td></tr>
  </table>

  <h2><a class="wl" href="#nation-covenant">契約王朝</a>(魅魔)</h2>
  <p>始於紀元3120「<a class="wl" href="#event-lilith-advent">莉莉絲降臨</a>」,始祖<a class="wl" href="#creature-lilithshadow">莉莉絲之影</a>退隱後不再親自統治,
  但依傳統,每一任<a class="wl" href="#race-lilith">魅魔</a>女王加冕時皆會採用「莉莉絲」為攝政稱號,以示血脈與秩序的延續。</p>
  <table class="wiki-table">
    <tr><th>稱號</th><th>在位期間</th><th>本名</th><th>事蹟</th></tr>
    <tr><td><a class="wl" href="#char-lilith1">莉莉絲一世「夜后」</a></td><td>紀元3120年即位</td><td>不可考</td><td>正式建立契約王朝與「情慾契約」制度</td></tr>
    <tr><td><a class="wl" href="#char-lilith3">莉莉絲三世</a></td><td>紀元3780前後</td><td>不可考</td><td>代表契約王朝簽署大交融協定</td></tr>
    <tr><td><a class="wl" href="#char-lilith5">莉莉絲五世</a></td><td>紀元5890前後</td><td>不可考</td><td>領軍參與鎮壓影之叛亂</td></tr>
    <tr><td><a class="wl" href="#char-vesha">莉莉絲七世・現任</a></td><td>紀元6230(當前)</td><td>薇夏(Vesha)</td><td>登基後依傳統加冕為「莉莉絲七世」</td></tr>
  </table>

  <h2><a class="wl" href="#nation-umbral">黑淵母邦</a>(黑暗精靈)</h2>
  <table class="wiki-table">
    <tr><th>稱號</th><th>在位期間</th><th>事蹟</th></tr>
    <tr><td><a class="wl" href="#char-umbrys">開國暗后 陰紗</a><br>Umbrys the Founder</td><td>紀元約1200~1500間</td><td>統一分散的黑暗精靈部族,建立黑淵母邦</td></tr>
    <tr><td><a class="wl" href="#char-cyanessa">現任暗后 賽妮絲</a><br>Cyanessa</td><td>紀元6230(當前)</td><td>與熔焰王國、契約王朝並列當代三大君主之一</td></tr>

'flagship-saga':{
  title:'《渴望的抉擇》三部曲大綱', category:'衍生故事', domain:null, tags:['故事大綱','三部曲','闇蝕之心','當代預言'],
  alt:"The Longing's Choice — A Proposed Trilogy",
  infobox:{'時間設定':'紀元6295~6300(第八次開花季前後)','核心懸念':'<a class="wl" href="#legendary-artifacts">闇蝕之心</a>的下落與<a class="wl" href="#pantheon-faith">當代預言</a>','結構':'三部曲,仿《魔戒》的多線政治+尋物任務'},
  body:`
  <p>這是一份把百科中既有伏筆——<a class="wl" href="#pantheon-faith">當代預言</a>、下落成謎的
  <a class="wl" href="#legendary-artifacts">闇蝕之心</a>、<a class="wl" href="#unclaimed-territories">影裔殘部</a>、
  以及<a class="wl" href="#pantheon-faith">永夜真理教</a>——串成一條主線的故事大綱提案,結構刻意仿照《魔戒》三部曲:
  一支跨種族「同伴隊」、一件必須被找到並抉擇如何處置的危險神器、多條政治支線,以及最終呼應世界觀核心主題的結局。</p>

  <h2>前提:為什麼是現在</h2>
  <p>紀元6295年,距離第八次<a class="wl" href="#magic-system">世界樹開花季</a>僅剩五年。<a class="wl" href="#nation-rootreach">根都</a>
  護根者發現世界樹的年度「流淚」異常減少——<a class="wl" href="#legendary-artifacts">世界樹之淚</a>的產量逐年下滑,暗示
  <a class="wl" href="#legendary-artifacts">闇蝕之心</a>並未真正消失,而是被人刻意封存,並開始緩慢滲透<a class="wl" href="#magic-system">魔力循環</a>。</p>

  <h2>同伴隊(仿魔戒遠征隊的跨種族小隊)</h2>
  <ul>
    <li><b><a class="wl" href="#char-reya">蕾雅(Reya)</a></b>——<a class="wl" href="#race-human">人族</a>年輕嚮導,凱恩·灰旅的後裔,<a class="wl" href="#legendary-artifacts">拓境羅盤</a>的現任守護者,故事的視角人物(對應佛羅多的「局外人視角」)</li>
    <li><b><a class="wl" href="#char-vygan">熔焰騎士(維岡)</a></b>——效忠<a class="wl" href="#royal-lineages">妃嵐女王</a>的年輕<a class="wl" href="#race-dragonkin">龍女</a>,家族與初代女王伊格妮絲同源,渴望證明自己不只是「王室的影子」</li>
    <li><b><a class="wl" href="#char-syra">拒教貴族(賽拉)</a></b>——<a class="wl" href="#nation-umbral">黑淵母邦</a>內部拒絕<a class="wl" href="#pantheon-faith">永夜真理教</a>教義的年輕貴族,揭露母邦內部腐化的關鍵人物</li>
    <li><b><a class="wl" href="#char-vero">根都使者(薇珞)</a></b>——<a class="wl" href="#race-dryads">樹精</a>護根者,道德與宗教權威的化身(對應甘道夫的定位)</li>
    <li><b><a class="wl" href="#char-nyle">贖罪的影魅(奈爾)</a></b>——一名對政治毫無興趣、卻因血緣捲入其中的隱居<a class="wl" href="#race-shadowkin">影魅</a>,知曉紀元5890
    <a class="wl" href="#event-shadow-rebellion">影之叛亂</a>的內幕(咕嚕/波羅莫式的悲劇弧線角色,背負污名卻可能是解開真相的關鍵)</li>
  </ul>

  <h2>第一部:破碎的預言</h2>
  <p>蕾雅所屬的商隊在<a class="wl" href="#unclaimed-territories">雲隙荒境</a>意外發現一小塊會「反向吞噬」魔力的黑色晶體碎片——
  闇蝕之心並非完整消失,而是碎裂流散多年。她被迫與各域代表組成小隊尋找其餘碎片。第一部尾聲,小隊遭
  <a class="wl" href="#pantheon-faith">永夜真理教</a>激進派伏擊,證實母邦內部確有勢力正在重組闇蝕之心,意圖在下次開花季
  世界樹最脆弱的時刻奪取控制權。</p>

  <h2>第二部:眾王的抉擇</h2>
  <p>政治線全面展開:<a class="wl" href="#royal-lineages">妃嵐女王</a>必須在信任跨域同盟與安撫國內保守「爐主」派系
  (他們不願為一則未證實的預言耗費資源)之間抉擇;<a class="wl" href="#nation-covenant">契約王朝</a>的莉莉絲七世則暗中與
  敵對勢力談判,換取自身政治利益,埋下背叛伏筆。中段高潮發生在一次魔力潮汐期間對<a class="wl" href="#nation-rootreach">根都</a>
  的突襲,測試這座「絕對中立聖地」能否真正扛住戰火。第二部尾聲,贖罪的影魅為保護同伴犧牲關鍵利益,揭露自己當年曾參與叛亂,
  並交出最後一塊碎片的位置線索——代價是永遠失去同伴的信任。</p>

  <h2>第三部:渴望的抉擇</h2>
  <p>高潮設定於世界樹本體,恰逢第八次開花季。同伴隊必須抉擇:徹底摧毀闇蝕之心(可能永久切斷<a class="wl" href="#magic-system">魔力循環</a>
  的一部分,削弱大陸魔法根基),或嘗試淨化並重新整合它(風險更高,一旦失敗可能徹底釋放其力量)。最終抉擇刻意呼應本作
  <a class="wl" href="#creation-myth">創世神話</a>與<a class="wl" href="#magic-system">魔力循環</a>的核心命題——魔力源於渴望與連結,
  而非單純的力量支配,因此解方不在於「摧毀」或「征服」,而在於角色們願不願意選擇彼此信任。</p>

  <h2>結局走向</h2>
  <p>蕾雅成為<a class="wl" href="#race-human">人族</a>正式融入大陸政治的象徵性人物;<a class="wl" href="#nation-pyraxis">熔焰王朝</a>
  聲望上升;<a class="wl" href="#nation-umbral">黑淵母邦</a>經歷內部改革,<a class="wl" href="#pantheon-faith">永夜真理教</a>影響力
  受挫但未被根除——刻意留下續集空間,而非一勞永逸的「大團圓」,更貼近艾瑟瑞亞「傳統與革新持續拉扯」的新生代基調。</p>

  <blockquote>這只是一份提案大綱,角色名字、細節走向都可以依你的喜好調整替換——核心是示範如何把百科裡分散的伏筆
  (預言、神器、異端、污名化的種族)串成一條可以推進到底的主線。</blockquote>

  <h2>完整章節大綱</h2>
  <ul>
    <li><a class="wl" href="#saga-part1">第一部:破碎的預言</a>——全14章</li>
    <li><a class="wl" href="#saga-part2">第二部:眾王的抉擇</a>——全14章</li>
    <li><a class="wl" href="#saga-part3">第三部:渴望的抉擇</a>——全14章</li>
  </ul>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#當代預言</span><span class="tag">#闇蝕之心</span><span class="tag">#影裔殘部</span><span class="tag">#人族</span>
  </div>
  `
},

  body:`

  <ol>

    <li><b>隱居者的門</b>——隊伍前往尋找傳說中知曉舊事的隱居<a class="wl" href="#race-shadowkin">影魅</a>。過程中首次直面永夜深淵對

    <li><b>碎片的回聲</b>——影魅同意加入,揭露自己對闇蝕之心「回聲」的敏感體質(能感應其他碎片方位),但拒絕透露完整過往,懸念加深。</li>
    <li><b>火月之路上</b>——五人小隊正式啟程,沿<a class="wl" href="#transit-network">火月之路</a>前往下一個碎片可能所在地。
    途中展現世界觀的地景與跨域文化衝突,蕾雅與龍女騎士在旅途瑣事上逐漸磨合。</li>
    <li><b>蜂鳴鎮的密探</b>——在<a class="wl" href="#nation-kindling">焰狐盟</a>蜂鳴鎮停留補給時,發現有人暗中監視隊伍行蹤——

    本書中期政治線的關鍵一章。</li>
    <li><b>伏擊</b>——隊伍在前往下一處線索途中遭永夜真理教激進派伏擊。戰鬥場面揭示對方組織性與武裝程度遠超預期,

    完整戰鬥設計詳見<a class="wl" href="#battle-ambush">伏擊戰</a>。</li>
    <li><b>破碎的預言</b>——伏擊後隊伍雖脫險但傷痕累累,拒教貴族從俘虜口中逼問出關鍵情報:真理教確實在重組闇蝕之心,

  </ol>

  body:`
  <p>務實、機靈,習慣用自嘲化解尷尬,是<a class="wl" href="#pathfinders-hold">拓境城</a>「不問出身只看本事」文化養出來的孩子。
  表面上灑脫隨性,內心其實背著「冒牌者症候群」——她沒選擇成為<a class="wl" href="#notable-figures">凱恩·灰旅</a>的後裔,
  但所有人都預期她該像創城者一樣扛起責任,而她自己也不確定辦不辦得到。</p>

  <h2>個性細節</h2>
  <p>說話快、愛用工匠術語打比方,緊張時會下意識檢查裝備確認「至少東西都在」。對權威人物(女王、大長老)不會怯場,
  反而對「被當成傳奇後代看待」這件事最不自在——她寧可別人記得她修好了什麼東西,而不是記得她姓什麼。</p>

  <h2>性格缺陷</h2>
  <p>習慣「先斬後奏」,遇到不確定的事寧可自己扛下來也不輕易求助或回報上級(<a class="wl" href="#saga-part1">第一部</a>第3章
  「私自帶回拓境城」就是這個缺陷的初次爆發)。這個缺陷在第二部會反噬她——當隊伍發現她一直隱瞞某些細節時,信任會出現裂痕。</p>

  <h2>弧線</h2>
  <p>從「只是想把工作做好的局外人」,走到「必須主動選擇自己要不要成為連結五域的橋樑人物」。<a class="wl" href="#saga-part3">第三部</a>
  第13章「蕾雅的選擇」收束這條線。</p>

  <h2>人際關係</h2>
  <p>與熔焰騎士<a class="wl" href="#char-vygan">維岡</a>發展出跨種族的過命交情,詳見<a class="wl" href="#char-relationships">人際關係與感情線</a>。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#人族</span><span class="tag">#拓境城</span><span class="tag">#三部曲大綱</span>
  </div>
  `
},

  <p>惜字如金,習慣觀察多於發言,判斷一個人往往只需要相處半天。私底下對堂妹<a class="wl" href="#char-relationships">妲莉亞</a>

  <h2>性格缺陷</h2>
  <p>道德潔癖有時會凌駕於團隊默契之上,<a class="wl" href="#saga-part2">第二部</a>第12章「對峙」正是她因為不願接受

  <h2>弧線</h2>
  <p>學會理想主義與務實結盟的平衡,<a class="wl" href="#saga-part3">第三部</a>裡她在母邦內部對抗真理教同情者的那場「內戰」,
  是她個人的清算時刻。</p>

  <h2>家族</h2>
  <p>堂妹<a class="wl" href="#char-relationships">妲莉亞</a>是黑淵母邦士兵,兩人立場相近,詳見人際關係頁。</p>

  body:`

  <h2>個性細節</h2>

  body:`
  <p>孤僻、慣用陰鬱的自嘲當防衛機制,長年活在自我懲罰式的愧疚裡。他曾是年輕的<a class="wl" href="#pantheon-faith">永夜真理教</a>信徒,
  真心相信教義能為長期被污名化的<a class="wl" href="#race-shadowkin">影魅</a>族群爭一口氣,直到暴力真正爆發才驚醒逃離,

  <h2>個性細節</h2>
  <p>慣用黑色幽默包裝真心話,越是重要的事越用玩笑口吻帶過,讓人很難察覺他其實在乎。獨處時會不自覺重複整理隨身物品,

  的特殊連結捨身相救,完成的正是「選擇連結而非繼續自我懲罰」的主題——直接呼應世界觀<a class="wl" href="#magic-system">魔力循環</a>的核心命題。</p>

'char-relationships':{
  title:'人際關係與感情線', category:'角色誌', domain:null, tags:['人際關係','感情線','跨種族'],
  alt:"Bonds & Romances — modeled on Legolas/Gimli, Aragorn/Arwen, Éowyn/Faramir",
  body:`
  <p>感情線刻意不放在主角團核心五人之中,以免分散主線任務的焦點——參考《魔戒》遠征隊本身沒有內部戀情,
  感情線另外安排在政治聯姻與戰火餘生兩條支線上。</p>

  <h2>蕾雅 × 維岡:跨種族的過命交情</h2>
  <p>參考精靈萊戈拉斯與矮人金靂——兩個原本互相輕視的種族代表,靠著並肩作戰磨出過命的交情,但不是愛情。</p>
  <ul>
    <li><b>第一部</b>:文化摩擦式的針鋒相對——<a class="wl" href="#char-vygan">維岡</a>覺得<a class="wl" href="#char-reya">蕾雅</a>
    「沒有魔力憑什麼指手畫腳」,蕾雅覺得維岡是「被頭銜寵壞的自大龍族」。兩人互相看不順眼,卻被迫合作。</li>
    <li><b>第二部第5章</b>:旅途中的瑣碎日常(分食、輪班守夜、彼此掩護)讓針鋒相對逐漸軟化成帶刺的玩笑,維岡開始注意到蕾雅
    那種「沒有魔力卻總能想出辦法」的韌性,蕾雅也發現維岡的驕傲底下其實是對自己家族沒落的深層焦慮。</li>
    <li><b>第三部決戰前夕</b>:維岡主動把家族佩劍託付給蕾雅保管——象徵他終於把「血統地位」的執念放下,轉而信任「本事」本身。
    這是全書最重要的信任支點,直接決定<a class="wl" href="#saga-part3">第三部</a>「渴望之選」能不能成功
    (蕾雅需要維岡不假思索地聽她判斷,而不是靠位階下令)。</li>
  </ul>

  <h2>感情線A(政治聯姻式):妃嵐女王 × 格倫・諾維</h2>
  <p><b>格倫・諾維(Glenn Norwood)</b>——男,32歲,<a class="wl" href="#race-human">人族</a>——是<a class="wl" href="#pathfinders-hold">拓境行會</a>
  護衛隊長,奉派保護跨域同盟隊伍。</p>
  <p><a class="wl" href="#royal-lineages">妃嵐女王</a>被爐主派系施壓,必須考慮聯姻以鞏固政權,但她私下對格倫懷有隱而未宣的情感。
  這段感情從一開始就被視為「不可能」,不只因為門第,更因為<a class="wl" href="#race-human">人族</a>在艾瑟瑞亞至今仍未被完全視為
  「真正的居民」。這條線的政治重量在於:妃嵐願不願意在公開場合承認這段感情,某種程度上就是她願不願意真正打破
  「人族是外人」這個大陸共識的試金石。</p>
  <p>收尾安排在終章「新生代的黎明」——她不必然要嫁給格倫,但可以藉由某個公開場合的舉動(例如破格冊封他,或公開致謝時刻意打破慣例),
  暗示她選擇的不只是私人感情,而是一種政治姿態,呼應亞拉岡加冕後才能光明正大迎娶亞玟的邏輯:身分與感情彼此綁定。</p>

  <h2>感情線B(戰火中萌生):妲莉亞・渥登 × 柳因</h2>
  <p><b>妲莉亞・渥登(Daria Voldrenn)</b>——女,29歲,<a class="wl" href="#race-drow">黑暗精靈</a>——是<a class="wl" href="#char-syra">賽拉</a>的堂妹,
  <a class="wl" href="#nation-umbral">黑淵母邦</a>士兵;<b>柳因(Lyien)</b>——男,表觀25歲,<a class="wl" href="#race-dryads">樹精</a>(樹精壽命長,
  25歲對他而言仍是初出茅廬的「幼樹」階段)——是<a class="wl" href="#nation-rootreach">根都</a>樹精護根者學徒。</p>
  <p>兩人在<a class="wl" href="#saga-part2">第二部</a>第10章「根都之危」的戰役中並肩作戰而相識。妲莉亞厭倦了黑淵母邦內部因為
  真理教派系鬥爭而永無止盡的猜忌與算計;柳因則對根都表面中立、實則對某些真相刻意隱瞞感到失望。兩人都是各自體制裡
  「清醒卻無力」的年輕人,在共同見證死亡與虛偽之後互相取暖。</p>
  <p>這條線的功能是象徵陰影與光明兩個信仰陣營的和解——一個黑暗精靈與一個樹精的結合,本身就是對「
  <a class="wl" href="#pantheon-faith">永夜真理教 vs 世界樹信仰</a>」對立敘事最溫柔的反駁。終章安排一段小插曲,暗示兩人決定
  共同在永夜深淵與晶夢花海交界處定居,實質成為兩域和解的活生生象徵。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#蕾雅</span><span class="tag">#維岡</span><span class="tag">#三部曲大綱</span>
  </div>
  `
},

  body:`
  <p>全書第一場正式戰鬥,規模刻意壓在小規模遭遇戰,用來初次具體展示<a class="wl" href="#legendary-artifacts">闇蝕之心</a>碎片的

  <p>15-20名<a class="wl" href="#pantheon-faith">永夜真理教</a>激進派士兵,由一名一次性敵方小頭目率領,配備會吸收溫度與魔力的
  粗製闇蝕晶片武器。</p>

  <h2>戰鬥流程</h2>
  <ul>
    <li><a class="wl" href="#char-nyle">奈爾</a>率先感應到闇蝕晶片那種「反向吞噬」的共鳴波動,提前數秒示警——這是他第一次讓隊伍
    真正意識到自己有用,而不只是需要提防的對象。</li>
    <li><a class="wl" href="#char-vygan">維岡</a>使用<a class="wl" href="#race-dragonkin">龍女</a>祖傳的「熾魂突襲」戰術
    (呼應<a class="wl" href="#event-sky-war">天穹之戰</a>中伊格妮絲一世的原創戰法)正面突破敵方前排。</li>
    <li><a class="wl" href="#char-syra">賽拉</a>運用黑暗精靈天生的暗影魔法製造混亂與致盲效果。</li>
    <li><a class="wl" href="#char-vero">薇珞</a>召喚根系纏繞術困住逃竄的敵兵,為後面的審訊留活口。</li>

    <a class="wl" href="#race-human">人族</a>「靠本事而非魔力」的定位。</li>
  </ul>

  <h2>代價</h2>

  護根者,親自隨隊追查——於此役殿後掩護隊伍撤退,力戰而死。這是全書第一個真正的犧牲,讓「懸賞」不再只是抽象的任務,
  而是有血有肉的代價。</p>

'battle-rootreach':{
  title:'根都之危', category:'戰役與對決', domain:'bloom', tags:['戰役','第二部','據點防衛戰'],
  alt:'第二部第10章 · 根都防衛戰',
  infobox:{'章節':'<a class="wl" href="#saga-part2">第二部</a>第10章','規模':'據點防衛戰','地點':'<a class="wl" href="#nation-rootreach">根都</a>','陣亡':'<a class="wl" href="#char-hodgan">赫崗長老</a>'},
  body:`
  <p>一次較小規模的<a class="wl" href="#magic-system">魔力潮汐</a>期間,<a class="wl" href="#pantheon-faith">永夜真理教</a>武力
  (因<a class="wl" href="#char-vannis">凡尼斯</a>洩漏的防禦時程表而精準得手)突襲根都,意圖搶奪當年產量正在下滑的
  <a class="wl" href="#legendary-artifacts">世界樹之淚</a>。</p>

  <h2>戰鬥流程</h2>
  <p>樹精大長老塞倫統籌護根者防禦,<a class="wl" href="#char-syra">賽拉</a>臨時召集<a class="wl" href="#nation-umbral">黑淵母邦</a>
  內部忠於正統的人馬支援。<a class="wl" href="#char-relationships">妲莉亞與柳因</a>在此戰中初次並肩作戰,是兩人感情線的起點。</p>
  <p>外牆結界被突破時,<a class="wl" href="#char-hodgan">赫崗長老</a>——原本只是抱持懷疑態度隨行觀察的熔焰王國保守派老爐主——
  身先士卒堵住缺口,為世界樹之淚的搶救與平民撤離爭取時間,力戰而死。</p>
  <p>戰鬥中意外截獲一則加密訊息,牽連<a class="wl" href="#nation-covenant">契約王朝</a>洩密——這是第11章「破綻」的引爆點。</p>

  <h2>魔法對決看點</h2>
  <p><a class="wl" href="#char-syra">賽拉</a>被迫用自己族群的「晶石脈動文」破界技巧對抗母邦本族的防禦工事,是她個人立場的直接考驗;
  <a class="wl" href="#char-reya">蕾雅</a>用<a class="wl" href="#legendary-artifacts">拓境羅盤</a>的精密度校正熔焰投石器的彈道,
  再次體現人族的戰場定位不是靠魔力,是靠腦子。</p>

  <h2>赫崗之死的意義</h2>
  <p>他生前反對女王插手這場跨域同盟,死後他的犧牲事蹟傳回<a class="wl" href="#nation-pyraxis">熔焰王廷</a>,反而成了說服保守
  爐主派系的關鍵——他用死亡完成了生前爭論做不到的事。</p>

  body:`
  <p>全書規模最大的戰役,五域全部出兵,<a class="wl" href="#royal-lineages">妃嵐女王</a>親征,<a class="wl" href="#nation-umbral">黑淵母邦</a>
  同時爆發內戰(<a class="wl" href="#char-syra">賽拉</a>一派 vs 真理教同情者),敵方以「濁魔力構裝體」
  (闇蝕碎片喚醒的污染魔力構造體,作為大量消耗型雜兵)為前鋒。</p>

  <h2>關鍵轉折</h2>
  <p><a class="wl" href="#char-ashmother">灰母</a>——影裔殘部真正的領袖,道德複雜的悲劇人物——率領一批從未參與過叛亂的
  <a class="wl" href="#race-shadowkin">影魅</a>趕到戰場,起初被誤認為敵軍,隨即證實他們是來阻止<a class="wl" href="#char-grayspeaker">灰語者</a>的。
  她最終死守一處潰堤缺口,用生命換取隊伍抵達闇蝕之心核心的時間——用犧牲替全體影魅洗刷污名。</p>
  <p>隊伍抵達核心時,發現<a class="wl" href="#char-vannis">凡尼斯</a>早已潛入,企圖獨吞重組完成的<a class="wl" href="#legendary-artifacts">闇蝕之心</a>
  為契約王朝謀利。他在與灰語者的爭執中被當場揭穿身分,證據被及時趕到的<a class="wl" href="#royal-lineages">薇夏</a>親眼目睹,
  她的心腹背叛徹底曝光——凡尼斯未死,而是當眾遭薇夏罷黜問罪,政治性的身敗名裂比死亡更符合他投機者的定位。</p>

  <h2>最終對決:奈爾 vs 灰語者</h2>
  <p><a class="wl" href="#char-grayspeaker">灰語者</a>——真理教真正的幕後主謀,原是受人尊敬的世界樹信仰祭司,因過去在一次魔力潮汐
  災難中失去家人而轉向異端——企圖以自身生命力徹底喚醒闇蝕之心。<a class="wl" href="#char-nyle">奈爾</a>認出他:灰語者正是當年
  引誘奈爾加入真理教的引路人,私人恩怨讓奈爾成為唯一能與他對抗的人。</p>
  <p>奈爾選擇用自己與闇蝕之心的「回聲」連結從內部瓦解控制(重傷但存活,從此留下永久印記)。灰語者拒絕被救贖,最終被自己
  企圖掌控的污染力量反噬吞沒而死——與奈爾「選擇連結而非繼續自我懲罰」的救贖弧線形成鮮明對照。</p>

  <h2>渴望之選</h2>
  <p>最終成功的關鍵,是<a class="wl" href="#char-vygan">維岡</a>不假思索地聽從<a class="wl" href="#char-reya">蕾雅</a>的戰術判斷
  (呼應決戰前夕託劍的信任鋪墊),而非憑位階強行下令——解法「長」在角色已經走過的路上,而非憑空出現。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#第三部</span><span class="tag">#闇蝕之心</span><span class="tag">#灰母</span><span class="tag">#灰語者</span>
  </div>
  `
},

'domain-ember':{
  title:'炙炎山脈', category:'五大生態域', domain:'ember', tags:['生態域','火','龍女','炎狐'],
  alt:'Ember Peaks',
  infobox:{'類型':'火山生態域','代表生物':'熔岩角獸、焰翼蜂鳥、灰燼鳳蝶','主要種族':'<a class="wl" href="#race-dragonkin">龍女</a>、<a class="wl" href="#race-emberfox">炎狐</a>、熔岩魅魔','建築風格':'熔鑄建築 (Emberforge)','貿易品':'火屬性晶石、熔岩金屬、焰翼蜂蜜'},
  body:`
  <p>炙炎山脈是艾瑟瑞亞五大生態域之一,終年被永恆的橙紅天空籠罩,遍布火山與熔岩河。作為<a class="wl" href="#race-dragonkin">龍女</a>與炎狐一族的家園,
  這裡的一切文化都圍繞著「力量」與「熱情」展開。</p>

  <h2>環境</h2>
  <p>地貌以活火山、熔岩河為主,天空終年呈現橙紅色澤。此地是<a class="wl" href="#magic-system">魔力循環</a>五種原始魔力中「火」屬性的來源地。</p>

  <h2>代表生物</h2>
  <ul>
    <li><b>熔岩角獸</b> —— 食物鏈頂級掠食者之前的大型生物</li>
    <li><b>焰翼蜂鳥</b> —— 食物鏈基礎物種</li>
    <li><b>灰燼鳳蝶</b> —— 中階物種</li>
  </ul>
  <p>完整食物鏈:基礎 → 焰翼蜂鳥 → 灰燼鳳蝶 → 熔岩角獸 → <a class="wl" href="#race-dragonkin">龍女</a>/炎狐(頂級)</p>

  <h2>建築:熔鑄建築 (Emberforge Architecture)</h2>
  <p>建築多半半嵌入火山岩壁,以「熔岩澆鑄法」建造——將熔岩導入預製模具,冷卻後形成天然強化的黑曜石牆體。屋頂普遍採用向上聚攏的尖錐造型,
  象徵「向天穹致敬」,同時利於排出硫煙。城市核心常圍繞一座「活火山井」而建,終年提供地熱與照明。</p>
  <p>代表建物包括<b>熔焰議事廳</b>(龍女母系氏族的權力中心,單一巨型黑曜石雕鑿而成)與<b>焰蜂塔</b>(炎狐族的蜂蜜貿易站)。
  色彩以黑曜石、赤銅、熔鑄玻璃為主,深黑搭配橙紅光紋。</p>

  <h2>季節性遷徙:火之誓約</h2>
  <p>夏季時,<a class="wl" href="#race-dragonkin">龍女</a>與炎狐會以炙炎山脈為中心向外遷徙,與其他種族進行「火之交融」儀式,詳見
  <a class="wl" href="#migration">跨域遷徙路線</a>。</p>

  <h2>政治版圖</h2>
  <table class="wiki-table">
    <tr><th>政體</th><th>統治形式</th><th>首都/中心</th><th>備註</th></tr>
    <tr><td><a class="wl" href="#nation-pyraxis"><b>熔焰王國</b></a><br>Pyraxis Dominion</td><td>爐火議會制,推舉「熔焰女王」統領</td><td>赤鑄都(Emberholt),建於<a class="wl" href="#race-dragonkin">龍女</a>之熔焰議事廳周邊</td><td><a class="wl" href="#race-dragonkin">龍女</a>母系氏族核心政體</td></tr>
    <tr><td><a class="wl" href="#nation-kindling"><b>焰狐盟</b></a><br>Kindling Accord</td><td>無中央君主,輪值代表制</td><td>蜂鳴鎮(Emberhive),圍繞焰蜂塔而建</td><td>炎狐部落聯盟</td></tr>
    <tr><td><a class="wl" href="#minor-factions"><b>熔岩魅魔飛地</b></a></td><td>貴族外派</td><td>灼焰廳</td><td>與<a class="wl" href="#domain-abyss">永夜深淵</a>的外交橋樑</td></tr>
  </table>
  <p><b>地標</b>:裂焰山脊(Rift Ridge)——大陸最活躍的火山鏈;永燃谷(Everember Vale)——終年燃燒不熄的地熱谷地,是「火之誓約」的聖地。</p>
  <p><b>對外關係</b>:熔焰王國與焰狐盟世代結盟,「火之誓約」即雙方最初和平協議的儀式化延續;與<a class="wl" href="#domain-lunar">月影古林</a>
  的月伏部落聯盟則因「火月之路」貿易線維持謹慎的商業夥伴關係,偶因牧場與晶礦採集權爆發邊境摩擦。</p>

  </div>
  `
},

  infobox:{'類型':'古木森林生態域','代表生物':'月影鹿、夢織蛛、銀月狼靈','主要種族':'<a class="wl" href="#race-lunarfang">狼女</a>、<a class="wl" href="#race-bloodfangfox">血狐</a>、<a class="wl" href="#race-moonsprite">月光精靈</a>','建築風格':'織影建築 (Shadowweave)','貿易品':'月光絲、夢織蛛絲、月影鹿角'},
  body:`
  <p>月影古林是一片巨大的古木森林,樹木隨月相變化色澤,是<a class="wl" href="#race-lunarfang">狼女</a>與月光精靈的家園,
  月光屬性魔力自此域流向世界樹根系。</p>

  <h2>環境</h2>
  <p>巨大古木森林,林相隨月相改變顏色——滿月時銀白,新月時轉為深藍。</p>

  <h2>代表生物與食物鏈</h2>
  <p>月光植物 → 月影鹿 → 夢織蛛 → <a class="wl" href="#race-lunarfang">狼女</a>/血狐(頂級)。此外亦棲息著銀月狼靈這類半靈體生物。</p>

  <h2>建築:織影建築 (Shadowweave Architecture)</h2>
  <p>幾乎不使用石材,以「活木塑形術」引導巨樹自然生長成居所——牆壁即是樹皮,窗戶是自然形成的樹瘤孔洞。建築高度分層,
  依樹冠層次劃分社會地位:地面層為公共議會空間,中層為工坊,樹冠層為貴族與長老居所。</p>
  <p>代表建物為<b>月下議會樹</b>(狼女部落核心,樹幹中空形成天然圓形議事廳)與<b>夢織塔</b>(狐女與夢織蛛共生建造)。</p>

  <h2>季節性遷徙:月之狂獵</h2>
  <p>秋季時,<a class="wl" href="#race-lunarfang">狼女</a>、血狐、月光精靈會大規模遷徙,尋找跨域伴侶,詳見<a class="wl" href="#migration">跨域遷徙路線</a>。
  歷史上曾在紀元2450爆發「<a class="wl" href="#history">月之狂亂</a>」,魔力潮汐失控導致長達三年的狂熱期。</p>

  <h2>政治版圖</h2>

    <tr><td><a class="wl" href="#nation-dreamsilk"><b>幻林城邦・夢絲城</b></a><br>Dreamsilk City</td><td>師徒制長老院</td><td>夢絲城,以夢織塔建築群為核心</td><td><a class="wl" href="#race-kitsune">狐女/九尾狐</a>建立,以貿易與情報仲介聞名</td></tr>
    <tr><td><a class="wl" href="#minor-factions"><b>荒血部</b></a><br>Bloodfang Wilds</td><td>游牧氏族,無固定領地</td><td>——</td><td>血狐,與月伏部落聯盟關係緊張</td></tr>
    <tr><td><a class="wl" href="#minor-factions"><b>銀月庇護地</b></a><br>Silvermoon Sanctuary</td><td>隱世聚落</td><td>林冠最古老樹層</td><td>月光精靈,幾乎不參與外交</td></tr>
  </table>
  <p><b>地標</b>:銀鬃嶺(Silvermane Ridge)——狼女主要狩獵地;夜嚎谷(Howlwake Hollow)——「月之羈絆」儀式聖地。</p>
  <p><b>對外關係</b>:月伏部落聯盟與夢絲城維持互利貿易同盟(皮草、月影鹿角換取幻夢染工藝品與情報);與荒血部則長期處於低烈度邊境衝突。</p>

'domain-abyss':{
  title:'永夜深淵', category:'五大生態域', domain:'abyss', tags:['生態域','暗影','魅魔','黑暗精靈'],
  alt:'Abyssal Depths',
  infobox:{'類型':'地底洞穴生態域','代表生物':'晶噬蠕蟲、影縛幽魂、深淵歌者','主要種族':'<a class="wl" href="#race-drow">黑暗精靈</a>、<a class="wl" href="#race-lilith">魅魔</a>、<a class="wl" href="#race-shadowkin">影魅</a>','建築風格':'晶脈建築 (Crystalvein)','貿易品':'暗影水晶、魅魔之吻精華'},
  body:`
  <p>永夜深淵是一套地下巨大洞穴系統,終年不見天日,僅靠遍布的晶石發出幽光照明。這裡是<a class="wl" href="#race-drow">黑暗精靈</a>與
  <a class="wl" href="#race-lilith">魅魔</a>建立階級秩序的領地,暗影屬性魔力的來源地。</p>

  <h2>環境</h2>
  <p>地下巨大洞穴系統,晶石發光取代日月照明。</p>

  <h2>建築:晶脈建築 (Crystalvein Architecture)</h2>
  <p>建於天然洞穴系統中,大量使用「晶石共鳴技術」——建築本身由發光晶礦構成,依附著者魔力自動調節亮度與溫度。空間設計強調「垂直階級」:
  女王宮殿位於洞穴最深最高處,學徒居所則散布於外圍較淺層。走廊常設計為狹窄迂迴,體現黑暗精靈重視隱密與試探的文化。</p>
  <p>代表建物為<b>深淵之心</b>(<a class="wl" href="#race-lilith">魅魔</a>女王居所,單一巨型紫水晶雕成)與<b>契約廳</b>
  (<a class="wl" href="#race-drow">黑暗精靈</a>簽訂正式契約的場所)。</p>

  <h2>歷史事件</h2>
  <p>紀元3120,「<a class="wl" href="#history">莉莉絲降臨</a>」——魅魔始祖出現,於此地建立永夜深淵的階級秩序。</p>

  <h2>政治版圖</h2>
  <table class="wiki-table">
    <tr><th>政體</th><th>統治形式</th><th>首都/中心</th><th>備註</th></tr>
    <tr><td><a class="wl" href="#nation-covenant"><b>契約王朝</b></a><br>Covenant Dynasty</td><td>世襲女王制,貴族依契約數量定爵位</td><td>契約都(Covenant Spire),環繞深淵之心</td><td><a class="wl" href="#race-lilith">魅魔</a>核心政體</td></tr>
    <tr><td><a class="wl" href="#nation-umbral"><b>黑淵母邦</b></a><br>Umbral Matriarchy</td><td>母系階級制,「暗后」統治</td><td>陰廷(Umbratheron)</td><td><a class="wl" href="#race-drow">黑暗精靈</a>核心政體</td></tr>
    <tr><td><a class="wl" href="#minor-factions"><b>影裔殘部</b></a><br>Remnant of the Shade</td><td>分散地下反抗網絡,不被承認</td><td>未圖之境(位置不明)</td><td>紀元5890「<a class="wl" href="#history">影之叛亂</a>」倖存者</td></tr>
  </table>
  <p><b>地標</b>:回聲深坑(Echoing Pit)——傳說通往更深未知領域的天然豎井,被兩大政體共同列為禁地。</p>
  <p><b>對外關係</b>:契約王朝與黑淵母邦名義上共享永夜深淵統治權,實則長期暗中角力,爭奪回聲深坑等戰略地標控制權;
  但對「影裔殘部」則採一致鎮壓立場。</p>

  </div>

},
'domain-bloom':{
  title:'晶夢花海', category:'五大生態域', domain:'bloom', tags:['生態域','夢境','花精','樹精'],
  alt:'Crystal Dream Meadows',
  infobox:{'類型':'漂浮花島生態域','代表生物':'幻光蝶群、根脈古樹守護者、夢露花精','主要種族':'<a class="wl" href="#race-bloomsprites">花精</a>、<a class="wl" href="#race-dryads">樹精</a>、星塵龍女、<a class="wl" href="#race-dreamdemon">夢魔</a>','建築風格':'綻放建築 (Bloomspire)','貿易品':'夢境花粉、幻光蝶翼粉'},
  body:`
  <p>晶夢花海由無數漂浮島嶼與巨大夢幻花海組成,是<a class="wl" href="#race-bloomsprites">花精</a>、
  <a class="wl" href="#race-dryads">樹精</a>與星塵龍女共同棲居之地,夢境屬性魔力自此匯入世界樹。</p>

  <h2>建築:綻放建築 (Bloomspire Architecture)</h2>
  <p>建築本身「有生命」——由樹精引導巨花與藤蔓共同生長而成,牆面會隨季節開花凋謝。浮空島嶼之間以「花藤橋」連接,橋身由柔韌花莖編織,
  踩踏時會微微發光。無明確「牆」的概念,多以花瓣簾幕、藤蔓屏風劃分空間。</p>
  <p>代表建物為<b>花瓣議會殿</b>(花精季節輪替領導制度的議事場所,每季更換花色外觀)與<b>夢露花塔</b>(星塵龍女的占星場所)。</p>

  <h2>季節性遷徙:覺醒之途</h2>
  <p>春季時,<a class="wl" href="#race-bloomsprites">花精</a>、星塵龍女、夢魔會攜帶夢境花粉向全大陸擴散,詳見
  <a class="wl" href="#migration">跨域遷徙路線</a>。</p>

  <h2>政治版圖</h2>

    <tr><td><a class="wl" href="#nation-rootreach"><b>根都</b></a><br>Rootreach</td><td>樹精長老院管理</td><td>環繞世界樹根基而建</td><td><a class="wl" href="#race-dryads">樹精</a>核心政體,全大陸公認中立聖地</td></tr>
    <tr><td><a class="wl" href="#nation-starisles"><b>十二星島盟</b></a><br>Twelve Star Isles</td><td>鬆散聯盟,依占卜結果決策</td><td>十二座依星座命名的漂浮小島</td><td><a class="wl" href="#race-stardust">星塵龍女</a>,保持中立超然</td></tr>
    <tr><td><a class="wl" href="#minor-factions"><b>夢境邊境守望者</b></a><br>Dreamveil Wardens</td><td>隱密巡守組織</td><td>夢淵之路沿線</td><td>夢魔組成,防止惡夢污染滲透</td></tr>
  </table>
  <p><b>對外關係</b>:花瓣聯盟與根都同域而治,共同守護世界樹周邊事務;十二星島盟則鮮少涉入域內政治。</p>

  infobox:{'類型':'深海生態域','代表生物':'光歌鯨、晶棘海龍、深淵燈籠魚','主要種族':'<a class="wl" href="#race-sirens">海妖</a>、<a class="wl" href="#race-watersprite">水精靈</a>、<a class="wl" href="#race-crystalwing">晶翼蝶女</a>','建築風格':'珊瑚建築 (Coralshrine)','貿易品':'深海珍珠、光歌鯨的歌聲水晶'},
  body:`
  <p>深海裂隙是高壓深海裂谷,遍布發光珊瑚宮殿,是<a class="wl" href="#race-sirens">海妖</a>一族的疆域,水屬性魔力的來源地。</p>

  <h2>建築:珊瑚建築 (Coralshrine Architecture)</h2>
  <p>完全建於水下,以「珊瑚培育術」引導珊瑚礁自然生長成宮殿結構,兼具堅固與美觀。建築內部充滿發光水母與螢光藻類作為照明,
  走廊設計呈流線型以配合水流。<a class="wl" href="#race-sirens">海妖</a>聚落常見「歌唱廳」,利用天然洞穴的回音效果放大歌聲。</p>
  <p>代表建物為<b>光歌鯨神殿</b>(供奉光歌鯨的聖地)與<b>深淵燈籠宮</b>(水精靈與晶翼蝶女共同居所)。</p>

  <h2>傳奇生物</h2>
  <p><a class="wl" href="#creature-abysssovereign">永眠海皇</a>是深海裂隙的守護者,能操控海流與記憶。</p>

  <p><b>對外關係</b>:歌詠議會與潮汐議會權力共享,鮮少衝突;燈籠淺礁站是深海裂隙與外界往來的實質窗口。</p>

'legendary-artifacts':{
  title:'知名神器與傳說物品', category:'神器與遺物', domain:null, tags:['神器','遺物','聖物'],
  alt:'Legendary Artifacts of Aetheria',
  infobox:{'已知神器數':'8件見於正史','最神聖':'世界樹之淚','最具威脅性':'闇蝕之心(下落成謎)'},
  body:`
  <p>艾瑟瑞亞的歷史大事往往與特定神器緊密纏繞——它們或見證和平的締結,或曾是叛亂的凶器,至今仍深刻影響著各政體的權力與信仰。</p>

  <table class="wiki-table">
    <tr><th>神器</th><th>起源事件</th><th>現況</th></tr>
    <tr><td>五域晶約</td><td>大交融協定(紀元3780)</td><td>完好,由護根者守護於根都</td></tr>
    <tr><td>破天槍</td><td>天穹之戰(紀元1200)</td><td>熔焰王朝王室聖物,現由妃嵐女王持有</td></tr>
    <tr><td>始祖契約書</td><td>莉莉絲降臨(紀元3120)</td><td>供奉於契約廳,用於國家級儀典</td></tr>
    <tr><td>闇蝕之心</td><td>影之叛亂(紀元5890)</td><td>下落成謎,傳說封印於未圖之境</td></tr>
    <tr><td>世界樹之淚</td><td>世界樹年度落淚</td><td>由護根者管制採集,嚴禁私下交易</td></tr>
    <tr><td>拓境羅盤</td><td>人族抵達初期(紀元850後)</td><td>原件典藏於拓境城,量產複製品廣泛流通</td></tr>
    <tr><td>星塵占卜盤</td><td>星塵龍女先祖傳說</td><td>典藏於夢露花塔</td></tr>
    <tr><td>光歌鯨骨笛</td><td>古代光歌鯨自我犧牲</td><td>典藏於光歌鯨神殿,僅大合唱長可吹奏</td></tr>
  </table>

  <h2>五域晶約 (The Concord Crystal)</h2>
  <p>為紀元3780「<a class="wl" href="#history">大交融協定</a>」簽署而鍛造的五面水晶,每一面分別與一域的魔力產生共鳴。
  只要晶約完整,協定便持續生效——傳說若任一面破裂,該域便自動解除協定義務。現供奉於<a class="wl" href="#unclaimed-territories">根都</a>,
  由<a class="wl" href="#pantheon-faith">護根者</a>日夜看守。</p>

  <h2>破天槍 (Skybreaker Lance)</h2>
  <p>由<a class="wl" href="#royal-lineages">熔焰王朝</a>初代女王伊格妮絲一世於紀元1200<a class="wl" href="#history">天穹之戰</a>中所持,
  據傳以墜落的星辰殘鐵鍛造而成,能短暫賦予持有者飛行之力,並可貫穿一般魔法結界。如今作為王室聖物代代相傳,由現任女王
  <a class="wl" href="#royal-lineages">妃嵐</a>持有,多用於加冕等重大儀式,鮮少真正用於實戰。</p>

  <h2>始祖契約書 (The First Covenant)</h2>
  <p><a class="wl" href="#creature-lilithshadow">莉莉絲之影</a>於紀元3120建立契約王朝時所立的原始文書,是一張會自我更新的「活體羊皮紙」,
  據說上面仍隱隱透著始祖親筆字跡的微光。任何在此書上締結的契約都會獲得魔法強制力,是<a class="wl" href="#race-lilith">魅魔</a>
  「情慾契約」制度得以運作的根本依據,現供奉於永夜深淵的契約廳。</p>

  <h2>闇蝕之心 (Heart of Umbral Corrosion)</h2>
  <p>紀元5890「<a class="wl" href="#history">影之叛亂</a>」期間,影魅首領用以奪取世界樹控制權的核心凶器——一顆會「反向吞噬」
  純淨以太魔力、將其逆轉為濁魔力的黑色晶核。叛亂被鎮壓後,此物並未被摧毀,而是被刻意封存,下落成謎;民間傳說指向
  <a class="wl" href="#unclaimed-territories">未圖之境</a>,若真相屬實,它很可能就是<a class="wl" href="#pantheon-faith">當代預言</a>
  中「沉睡之影」所指的存在。</p>

  <h2>世界樹之淚 (Worldroot's Tears)</h2>
  <p><a class="wl" href="#creature-titan">世界樹</a>每年「流淚」所產生的金色魔力樹液,凝結後形成半透明琥珀寶石,具有極強的療癒與回春效果,
  也用於加冕、締約等高等儀式。因產量稀少,私自交易屬重罪,僅由護根者統一管制採集與分配。</p>

  <h2>拓境羅盤 (Pathfinder's Compass)</h2>
  <p>由<a class="wl" href="#notable-figures">凱恩·灰旅</a>在人族抵達初期,憑藉對雲海洋流的觀察所打造的機械式羅盤——完全不依賴魔力運作,
  純粹以精密工藝偵測安全的雲海航道。原件典藏於拓境城,而其量產複製品早已成為<a class="wl" href="#transit-network">雲舟商隊</a>的標準配備,
  也解釋了<a class="wl" href="#race-human">人族</a>何以能在毫無元素親和力的情況下,仍壟斷大陸交通網絡的營運。</p>

  <h2>星塵占卜盤 (The Stardust Oracle Disc)</h2>
  <p>傳說隨<a class="wl" href="#race-stardust">星塵龍女</a>先祖一同墜落天穹的古老水晶圓盤,能即時映照星象變化,是「星辰交融」儀式中不可或缺的占卜工具,
  典藏於夢露花塔。</p>

  <h2>光歌鯨骨笛 (The Whalesong Flute)</h2>
  <p>以數百年前一頭自願擱淺的古老光歌鯨骨骼雕成的笛器,能安撫甚至召喚深海生物,於「海之合唱」儀式中使用,
  現供奉於光歌鯨神殿,僅由<a class="wl" href="#notable-figures">大合唱長珂拉莉</a>有資格吹奏。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#大交融協定</span><span class="tag">#天穹之戰</span><span class="tag">#影之叛亂</span><span class="tag">#當代預言</span>
  </div>
  `
},

'event-sky-war':{
  title:'天穹之戰', category:'重大歷史事件', domain:'ember', tags:['歷史事件','天穹之戰','紀元1200'],
  alt:'紀元1200 · The War of the High Sky',
  infobox:{'時間':'紀元1200','交戰方':'龍女氏族 vs 天使族','關鍵人物':'伊格妮絲一世','結果':'龍女慘勝,熔焰王朝建立'},
  body:`
  <p>天穹之戰是艾瑟瑞亞歷史上第一場、也是規模最大的一場「跨界」戰爭,交戰對象並非大陸原生種族,而是棲居於雲海之上更高處、
  此前對大陸事務近乎漠不關心的「天使族」。</p>

  <h2>背景</h2>
  <p>紀元850「第一次魔力崩壞」後,世界樹陷入長達三百餘年的沉睡,大陸<a class="wl" href="#magic-system">魔力循環</a>因此紊亂,
  未經淨化的濁魔力持續外洩、瀰漫至雲海更高層。天使族察覺這股「污染」擴散,將其解讀為大陸情慾魔力氾濫失控的徵兆,
  決意介入清除,遂揮軍南下。</p>

  <h2>戰役經過</h2>
  <p><a class="wl" href="#race-dragonkin">龍女</a>氏族首當其衝,面對天使族優勢的光輝魔法節節敗退,傷亡慘重。危急時刻,
  年輕的氏族戰士伊格妮絲挺身而出,率領殘部另闢蹊徑,以自創的近身纏鬥戰術突破天使族倚賴的遠程光輝結界,
  最終擊潰天使先鋒部隊,迫使天使族撤回雲海之上,此後極少再現身介入大陸事務。</p>

  <h2>餘波</h2>
  <p>戰爭中雙方交戰時灑落的龍血滲入大陸各處,被認為是<a class="wl" href="#race-stardust">星塵龍女</a>等混血支系誕生的起源。
  傳說<a class="wl" href="#creature-starfall">星滅龍王</a>亦於此戰現身守護天穹,自此被龍女奉為信仰對象(詳見<a class="wl" href="#pantheon-faith">信仰體系</a>)。
  伊格妮絲因戰功被推舉為初代熔焰女王,統一原本各自為政的龍女氏族,建立<a class="wl" href="#nation-pyraxis">熔焰王國</a>,
  其所持之矛後世稱為<a class="wl" href="#legendary-artifacts">破天槍</a>,成為王室世代相傳的聖物。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#熔焰王國</span><span class="tag">#破天槍</span><span class="tag">#星滅龍王</span><span class="tag">#王室譜系</span>
  </div>
  `
},
'event-lilith-advent':{
  title:'莉莉絲降臨', category:'重大歷史事件', domain:'abyss', tags:['歷史事件','莉莉絲降臨','紀元3120'],
  alt:'紀元3120 · The Advent of Lilith',
  infobox:{'時間':'紀元3120','地點':'永夜深淵','關鍵人物':'莉莉絲之影','結果':'契約王朝建立'},
  body:`
  <p>莉莉絲降臨是永夜深淵政治秩序的起點,標誌著這片黑暗洞窟系統從長期無序狀態,轉變為艾瑟瑞亞最具組織性的政體之一。</p>

  <h2>背景</h2>
  <p>紀元850第一次魔力崩壞後,<a class="wl" href="#domain-abyss">永夜深淵</a>陷入長期混亂,黑暗精靈部族分裂交戰,
  魅魔的原始形態(彼時尚無正式族名,僅被稱為「夜語者」)則四散於各洞穴中,沒有任何統一組織。</p>

  <h2>降臨與建制</h2>
  <p>一名自稱源於太虛本身的存在——莉莉絲——現身於深淵最幽暗處,以無可抗拒的魅力與智慧,在極短時間內收攏夜語者的效忠,
  建立起「情慾契約」制度,將原本混亂的魅力運用規則化、制度化。她自任首任女王「莉莉絲一世」,建立<a class="wl" href="#nation-covenant">契約王朝</a>。</p>

  <h2>影響</h2>
  <p>契約王朝的出現為永夜深淵首次帶來穩定秩序,但也間接促成黑暗精靈部族出於制衡心理,於紀元1450正式整合為
  <a class="wl" href="#nation-umbral">黑淵母邦</a>,形成延續至今的雙政體並立局面。莉莉絲本人在建立王朝後逐漸退隱,
  不再親自處理政務,但「莉莉絲」稱號自此成為歷代女王世襲攝政稱號傳統的起點,她的存在也被<a class="wl" href="#pantheon-faith">莉莉絲教團</a>
  奉為神格,始祖契約書則被列為<a class="wl" href="#legendary-artifacts">神器</a>供奉至今。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#契約王朝</span><span class="tag">#莉莉絲之影</span><span class="tag">#始祖契約書</span><span class="tag">#王室譜系</span>
  </div>
  `
},
'event-grand-concord':{
  title:'大交融協定', category:'重大歷史事件', domain:null, tags:['歷史事件','大交融協定','紀元3780'],
  alt:'紀元3780 · The Grand Concord',
  infobox:{'時間':'紀元3780','地點':'世界樹下(今根都)','簽署方':'五域代表','結果':'跨域貿易時代開啟,根都中立地位確立'},
  body:`
  <p>大交融協定是艾瑟瑞亞五域關係史上最關鍵的轉捩點,結束了長期猜忌與零星衝突,開啟延續至今的跨域貿易與外交穩定期。</p>

  <h2>背景</h2>
  <p>天穹之戰與莉莉絲降臨後,五域雖各自穩定內政,但域間猜忌未解——尤其新興的<a class="wl" href="#nation-covenant">契約王朝</a>
  與其他域幾乎沒有正式貿易往來,<a class="wl" href="#domain-ember">炙炎山脈</a>與<a class="wl" href="#domain-lunar">月影古林</a>
  之間也因牧場與晶礦採集權時常爆發邊境摩擦。</p>

  <h2>協定簽署</h2>
  <p>在<a class="wl" href="#race-dryads">樹精</a>長老院的斡旋下,五域代表首次齊聚世界樹下,經過數月談判,簽署了具魔法強制力的
  和平協定,詳見<a class="wl" href="#notable-figures">五域代表名單</a>,並鍛造<a class="wl" href="#legendary-artifacts">五域晶約</a>
  作為協定的實體見證。</p>

  <h2>影響</h2>
  <p>協定開啟長達數百年的跨域貿易穩定期,<a class="wl" href="#transit-network">火月之路、夢淵之路</a>等主要商路自此正式確立並受到協定保障。
  這也是<a class="wl" href="#nation-rootreach">根都</a>被公認為五域共同承認之中立聖地地位確立的關鍵時刻——五域晶約至今仍供奉於此,
  象徵協定持續有效。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#五域晶約</span><span class="tag">#根都</span><span class="tag">#經濟與貿易</span><span class="tag">#歷史英雄錄</span>
  </div>
  `
},
'event-shadow-rebellion':{
  title:'影之叛亂', category:'重大歷史事件', domain:'abyss', tags:['歷史事件','影之叛亂','紀元5890'],
  alt:'紀元5890 · The Shadow Rebellion',
  infobox:{'時間':'紀元5890','地點':'根都外圍','鎮壓者':'三大君主聯軍','結果':'叛亂被鎮壓,闇蝕之心失蹤'},
  body:`
  <p>影之叛亂是艾瑟瑞亞歷史上最接近「大陸級災難」的一次危機,也是三大君主僅有的一次聯合出兵案例。</p>

  <h2>背景</h2>
  <p>紀元4200興起的<a class="wl" href="#pantheon-faith">永夜真理教</a>,經過近1700年的地下發展,在
  <a class="wl" href="#nation-umbral">黑淵母邦</a>內部逐漸取得部分貴族暗中支持,教義主張的「永夜終將吞噬光明」
  也從單純信仰演變為具體的政治野心。</p>

  <h2>事件經過</h2>
  <p>真理教激進派串聯部分影魅,趁世界樹某次年度「流淚」儀式防備鬆懈之際,試圖闖入<a class="wl" href="#nation-rootreach">根都</a>
  奪取<a class="wl" href="#legendary-artifacts">世界樹之淚</a>,並企圖以<a class="wl" href="#legendary-artifacts">闇蝕之心</a>
  逆轉<a class="wl" href="#magic-system">魔力循環</a>,引發大陸級「枯萎期」以「淨化」世界。陰謀被護根者及時察覺,
  熔焰王朝卡蜜拉女王、契約王朝莉莉絲五世與黑淵母邦當時的暗后罕見聯合出兵,將叛軍鎮壓於根都外圍。</p>

  <h2>餘波</h2>
  <p>首謀影魅下落不明,<a class="wl" href="#legendary-artifacts">闇蝕之心</a>也在混亂中失蹤,至今未被尋回。倖存的影魅殘部退居
  <a class="wl" href="#unclaimed-territories">未圖之境</a>,形成<a class="wl" href="#unclaimed-territories">影裔殘部</a>;
  永夜真理教則轉為更隱密的地下活動,<a class="wl" href="#nation-umbral">黑淵母邦</a>與<a class="wl" href="#nation-covenant">契約王朝</a>
  至今對其保持高度戒備。三大君主聯合出兵的先例,也成為<a class="wl" href="#pantheon-faith">當代預言</a>被反覆引用討論的歷史參照。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#永夜真理教</span><span class="tag">#闇蝕之心</span><span class="tag">#影裔殘部</span><span class="tag">#當代預言</span>
  </div>
  `
},

'nation-pyraxis':{
  title:'熔焰王國', category:'各國政體', domain:'ember', tags:['政體','熔焰王國','龍女'],

  body:`
  <p>熔焰王國是<a class="wl" href="#domain-ember">炙炎山脈</a>的核心政體,以龍女母系氏族為統治核心,採「爐火議會制」,
  由各大氏族的最強者「爐主」共同推舉「熔焰女王」統領全境。</p>

  <h2>歷史</h2>
  <p>建國於<a class="wl" href="#event-sky-war">天穹之戰</a>之後,初代女王伊格妮絲一世以戰功統一原本各自為政的龍女氏族,
  終結了戰前氏族間為爭奪火山資源而長期存在的零星衝突。完整世系詳見<a class="wl" href="#royal-lineages">王室譜系</a>。</p>

  <h2>社會與文化</h2>
  <p>王國內部氏族地位並非世襲固定,而是依「爐火議會」定期考核的戰功與資源貢獻重新排序,這使熔焰王國政治充滿動態競爭——
  即便是王室嫡系,若表現不如預期也可能被邊緣化。<a class="wl" href="#race-dragonkin">龍女</a>崇尚力量與熱情的傳統,
  在此政體下被進一步制度化為「爐火積分」考核系統。</p>

  <h2>地標</h2>
  <p>赤鑄都建於熔焰議事廳周邊,裂焰山脊與永燃谷分別是主要的火山資源地與宗教聖地。</p>

  <h2>對外關係</h2>
  <p>與<a class="wl" href="#nation-kindling">焰狐盟</a>世代結盟;與<a class="wl" href="#nation-lunarfang">月伏部落聯盟</a>
  因<a class="wl" href="#transit-network">火月之路</a>貿易維持謹慎夥伴關係,偶因晶礦採集權起摩擦;對永夜深淵的兩大政體抱持務實但保留戒心的態度。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#炙炎山脈</span><span class="tag">#龍女</span><span class="tag">#天穹之戰</span><span class="tag">#破天槍</span>
  </div>
  `
},
'nation-kindling':{

  infobox:{'政體類型':'部落聯盟(輪值代表制)','建立時間':'不可考(先於熔焰王國)','中心':'蜂鳴鎮','核心種族':'炎狐'},
  body:`
  <p>焰狐盟是炎狐一族鬆散的部落聯盟,無中央君主,以蜂鳴鎮(焰蜂塔周邊聚落)為貿易與議事節點,推派輪值代表與
  <a class="wl" href="#nation-pyraxis">熔焰王國</a>交涉。</p>

  <h2>歷史與現況</h2>
  <p>焰狐盟的歷史遠比記載的政治實體更古老,傳說早於熔焰王朝建立前,炎狐族就已在焰蜂塔周邊發展出穩定的蜂蜜貿易網絡。
  與熔焰王國的結盟關係並非臣屬,而是基於長期互利的貿易夥伴協議——龍女提供軍事保護,炎狐則以焰翼蜂蜜與精湛的蜂巢建築技術作為回報。</p>

  <h2>社會與文化</h2>
  <p>相較於龍女的積分競爭文化,焰狐盟的政治文化更重視協商與長期信譽,輪值代表制度確保沒有單一氏族能長期壟斷話語權。</p>

  </div>
  `
},

  body:`

  <h2>歷史</h2>
  <p>聯盟並非一次性建立,而是歷經數個世紀,由原本各自為戰的狼群部落逐漸整合而成,整合過程並不總是和平——與至今仍游離於

  <h2>社會與文化</h2>

  <p>建立於<a class="wl" href="#event-lilith-advent">莉莉絲降臨</a>事件,是永夜深淵在第一次魔力崩壞後陷入長期無序狀態時,

  body:`
  <p>根都是<a class="wl" href="#race-dryads">樹精</a>聚落,環繞世界樹艾瑟瑞姆根基而建,是全大陸唯一被所有種族視為「中立聖地」的

  <h2>歷史地位的確立</h2>
  <p>根都的中立地位並非自始即被所有政體認可,而是在紀元3780<a class="wl" href="#event-grand-concord">大交融協定</a>簽署後
  才正式確立為五域共同承認的聖地——<a class="wl" href="#legendary-artifacts">五域晶約</a>至今仍供奉於此。</p>

  <h2>社會與文化</h2>
  <p>大長老塞倫領導的長老院,職責不僅是宗教事務,也包含仲裁跨域爭端——由於根都的絕對中立性,許多域間糾紛最終都會提交
  根都長老院調解。</p>

  `

  body:`
  <p>十二星島盟是<a class="wl" href="#race-stardust">星塵龍女</a>依星象分組而成的鬆散聯盟,分布於十二座漂浮小島,各島依所屬星座
  命名,無中央政府,重大事務由「星辰交融」儀式的占卜結果決定,<a class="wl" href="#legendary-artifacts">星塵占卜盤</a>是此決策
  過程中不可或缺的工具。</p>

  <h2>社會與文化</h2>
  <p>相較於其他政體,十二星島盟的政治決策帶有強烈的宿命論色彩——族群相信重大決策的結果早已寫在星象之中,占卜不是預測而是
  「揭示」。這種文化也使星塵龍女在域內外交事務上顯得超然,鮮少主動介入政治角力。</p>

  <h2>對外關係</h2>
  <p>與同域的<a class="wl" href="#nation-petalconcord">花瓣聯盟</a>、<a class="wl" href="#nation-rootreach">根都</a>關係良好但保持距離;
  因其超然立場,常被其他域邀請作為調停的第三方。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#晶夢花海</span><span class="tag">#星塵龍女</span><span class="tag">#星塵占卜盤</span>
  </div>
  `
},

'nation-tidewatch':{
  title:'潮汐議會', category:'各國政體', domain:'trench', tags:['政體','潮汐議會','水精靈'],
  alt:'Tidewatch Council',
  infobox:{'政體類型':'獨立行政議會','位置':'回音礁(與歌詠議會共享)','核心種族':'水精靈'},
  body:`
  <p>潮汐議會是水精靈的政體,負責<a class="wl" href="#domain-trench">深海裂隙</a>與陸地/淺海之間的秩序維護,與
  <a class="wl" href="#nation-choral">歌詠議會</a>共享回音礁作為政治中心,但保有獨立行政權——兩者分工明確:歌詠議會處理域內事務
  與信仰儀式,潮汐議會則專責對外邊界巡守與淺海貿易安全。</p>

  <h2>對外關係</h2>
  <p>與歌詠議會權力共享,鮮少衝突,是艾瑟瑞亞政治結構中少見的「雙軌共治且高度和諧」案例。</p>

  <h2>現況</h2>
  <p>相較於陸地五國的層層權謀,潮汐議會的運作極為低調——多數陸上種族甚至不清楚深海裂隙其實由兩個獨立政體共治,
  這種「隱形治理」某種程度上也是水精靈刻意維持的低調策略,避免捲入陸地政治的紛爭。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#深海裂隙</span><span class="tag">#歌詠議會</span>
  </div>
  `
},
'minor-factions':{
  title:'次要勢力與組織', category:'各國政體', domain:null, tags:['次要勢力','飛地','游牧','隱世'],
  alt:'Minor Factions & Organizations',
  body:`
  <p>除了各域的主要政體,艾瑟瑞亞還存在一批規模較小、卻各具特色的勢力與組織,它們雖不主導域內政治,卻在跨域關係與地方敘事中
  扮演不可忽視的角色。</p>

  <h2>熔岩魅魔飛地</h2>
  <p>少數<a class="wl" href="#race-lilith">魅魔</a>貴族因政治聯姻或貿易協議定居<a class="wl" href="#domain-ember">炙炎山脈</a>,
  建立小型飛地「灼焰廳」,作為永夜深淵與炙炎山脈的外交橋樑,人數雖少但因身兼兩域的雙重身分,常在外交場合扮演關鍵中介角色。</p>

  <h2>荒血部</h2>
  <p><a class="wl" href="#race-bloodfangfox">血狐</a>游牧氏族,居無定所,活動於<a class="wl" href="#domain-lunar">月影古林</a>邊境的荒僻地帶,與
  <a class="wl" href="#nation-lunarfang">月伏部落聯盟</a>關係緊張——領地與獵場的歷史糾紛可追溯至部落聯盟整合初期,至今仍未完全化解。</p>

  <h2>銀月庇護地</h2>
  <p><a class="wl" href="#race-moonsprite">月光精靈</a>隱世聚落,深居林中最古老的樹冠層,幾乎不參與外交事務,僅在世界樹開花季現身,是月影古林最神秘、最少被記載的族群。</p>

  <h2>夢境邊境守望者</h2>
  <p><a class="wl" href="#race-dreamdemon">夢魔</a>組成的隱密組織,職責是巡守<a class="wl" href="#domain-bloom">晶夢花海</a>與<a class="wl" href="#domain-abyss">永夜深淵</a>
  交界的夢淵之路,防止惡夢污染滲透,組織成員身分極少公開,外界對其實際規模與運作方式所知有限。</p>

  <h2>燈籠淺礁站</h2>
  <p><a class="wl" href="#race-crystalwing">晶翼蝶女</a>建立的小型前哨站,位於深海與淺海交界,主要負責與<a class="wl" href="#domain-trench">深海裂隙</a>以外世界的貿易往來,
  是深海裂隙對外交流的實質窗口。</p>

  <h2>影裔殘部</h2>
  <p>紀元5890<a class="wl" href="#event-shadow-rebellion">影之叛亂</a>失敗後,倖存的<a class="wl" href="#race-shadowkin">影魅</a>退居深淵最幽深、未被繪製地圖的角落,
  形成分散的地下反抗網絡,不被<a class="wl" href="#nation-covenant">契約王朝</a>與<a class="wl" href="#nation-umbral">黑淵母邦</a>
  承認為合法勢力,是永夜深淵當前最大的政治不穩定因素,詳見<a class="wl" href="#unclaimed-territories">未歸屬地帶</a>。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#未歸屬地帶</span><span class="tag">#影之叛亂</span>
  </div>
  `
},

  body:`
  <p>黑暗精靈(Drow'Vey)實行嚴格的母系階級社會,崇拜暗影與權力。</p>
  <h2>服飾</h2>

  <h2>藝術:晶石共鳴樂器</h2>
  <p>利用晶石震動頻率製造音樂,聲音只有具備魔力共鳴能力者可聞。</p>
  <h2>文字</h2>

'race-human':{
  title:'人族', category:'種族', domain:null, tags:['種族','外來者','拓境行會聯合','未歸屬地帶'],
  alt:'Humankind · 拓境者',
  infobox:{'棲地':'<a class="wl" href="#pathfinders-hold">雲隙荒境・拓境城</a>','社會結構':'拓境行會聯合(鬆散商會制)','抵達時間':'紀元850前後(眾說紛紜)','魔法親和':'<a class="wl" href="#magic-system">共鳴系</a>特化,元素/情慾系天賦薄弱'},
  body:`
  <p>人族並非艾瑟瑞亞五大生態域「原生」的種族,而是<a class="wl" href="#history">紀元850「第一次魔力崩壞」</a>前後,
  自某個不可考的裂隙墜入這座浮空大陸的外來者。他們沒有與任何一域天生的元素親和力,卻也因此發展出獨特的生存之道。</p>

  <h2>起源:眾說紛紜的墜落</h2>
  <p>關於人族的起源,大陸上流傳著至少三種說法,而人族自己也未能給出定論:</p>
  <ol>
    <li><b>崩壞裂隙說</b>——當年世界樹因過度開採陷入沉睡,現實的帷幕隨之出現裂縫,一批來自某個「近乎無魔」世界的人們,便從裂縫中墜落雲海,輾轉攀上艾瑟瑞亞。</li>
    <li><b>失敗造物說</b>——部分<a class="wl" href="#race-dryads">樹精</a>學者認為,人族其實是世界樹早期夢境中一次「未完成的嘗試」——
    詳見<a class="wl" href="#creation-myth">創世神話</a>——祂想像出不需依附特定元素也能存在的生命形式,卻因夢境尚未成熟而將其遺落在大陸邊緣。</li>
    <li><b>先民說</b>——少數人族長老相信,他們的祖先其實遠比記載更早抵達此地,只是長期被排除在各域歷史敘事之外,
    「紀元850」不過是他們終於被其他種族記錄下來的時間點,而非真正的抵達之時。</li>
  </ol>
  <p>無論何者為真,人族普遍接受一個事實:他們是這座大陸上最年輕、卻也最缺乏「與生俱來魔力」的族群。</p>

  <h2>魔法親和:共鳴系的專家</h2>
  <p>由於沒有特定的元素傾向,人族幾乎無法修習<a class="wl" href="#magic-system">元素系魔法</a>,情慾系魔力天賦也普遍薄弱。然而正因為
  「一無所有」,他們反而在<a class="wl" href="#magic-system">共鳴系魔法</a>——也就是跨種族互動時最容易觸發的混合魔法——展現出異於他族的天賦,
  使人族逐漸發展出「調停者」與「中介者」的社會角色。</p>

  <h2>社會結構:拓境行會聯合</h2>
  <p>人族沒有統一王國,而是以鬆散的商會與工匠公會形式組成<b>拓境行會聯合(Pathfinder's Concord)</b>,總部設於
  <a class="wl" href="#unclaimed-territories">雲隙荒境</a>中由人族一手建立的據點——<a class="wl" href="#pathfinders-hold">拓境城(Pathfinder's Hold)</a>,
  完整市容與行會結構詳見專頁介紹。</p>
  <p>由於不受任何單一域的<a class="wl" href="#magic-system">魔力循環</a>束縛,人族成為<a class="wl" href="#transit-network">大陸交通網絡</a>
  中雲舟商隊的主要操作者,穿梭於五域之間從事貿易、傳信與外交斡旋,也因此被部分排外種族稱為「無魔之民」——帶有輕蔑意味的稱呼,
  人族自己則多半自稱「拓境者」。</p>

  <h2>文化特色</h2>
  <ul>
    <li>沒有統一信仰,反而樂於吸收、記錄各族的<a class="wl" href="#creation-myth">創世異本</a>與歷史,拓境城因此擁有全大陸最完整的跨域史料庫。</li>
    <li>建築風格混雜借用五域元素(熔鑄工法的骨架、珊瑚建材的防水塗層等),因地制宜,毫無「純粹」可言——這正是人族引以為傲之處。</li>
    <li>因缺乏長壽或強大體魄,人族格外重視工具與契約精神,擅長鍛造與草擬跨域協議,是各政體外交場合常見的中立文書撰寫者。</li>
  </ul>

  <h2>對外關係</h2>
  <p>人族在各域普遍被視為「有用但不完全被信任」的外來者——熔焰王國樂於雇用人族商隊,契約王朝欣賞人族草擬契約的嚴謹,
  但黑淵母邦與部分保守的<a class="wl" href="#race-lunarfang">狼女</a>部落仍對這群「毫無魔力根基」的異類抱持戒心。人族之所以能在毫無元素親和力的情況下
  仍壟斷大陸交通網絡的營運,關鍵便在於凱恩·灰旅所打造的<a class="wl" href="#legendary-artifacts">拓境羅盤</a>。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#拓境城</span><span class="tag">#雲隙荒境</span><span class="tag">#共鳴系魔法</span><span class="tag">#創世神話</span>
  </div>
  `
},

  <h2>歷史</h2>

  <p>並非所有影魅都參與過叛亂——仍有部分影魅維持傳統的隱居生活方式,對政治毫無興趣,但自叛亂後,整個種族在永夜深淵普遍受到

'magic-system':{
  title:'魔力循環系統', category:'魔法與循環', domain:null, tags:['魔法','世界樹','循環'],
  alt:'The Five-Stage Circulation',
  infobox:{'核心':'<a class="wl" href="#creature-titan">世界樹 艾瑟瑞姆</a>','階段數':'五階段','年度現象':'魔力潮汐','週期現象':'世界樹開花季(7年)'},
  body:`
  <p>艾瑟瑞亞的一切魔法均源自貫穿全大陸的五階段魔力循環,由世界樹<a class="wl" href="#creature-titan">艾瑟瑞姆</a>作為心臟驅動。</p>

  <h2>五階段循環</h2>
  <h3>階段一:吸收 (Absorption)</h3>
  <p>世界樹根系深入五大域,吸收原始魔力(火、月光、暗影、夢境、水)。</p>
  <h3>階段二:轉化 (Conversion)</h3>
  <p>中央晶核將五種魔力融合為「純淨以太魔力」,過程會產生「魔力果實」——大陸上最珍貴的資源。</p>
  <h3>階段三:分配 (Distribution)</h3>
  <p>通過「魔力脈絡」(發光的樹根與浮空河流)輸送至各域。魔力濃度越高,生物性慾越強。</p>
  <h3>階段四:淨化 (Purification)</h3>
  <p>世界樹葉片會過濾「濁魔力」(戰爭、過度情慾、負面情緒),轉化為純淨能量。</p>
  <h3>階段五:回饋 (Feedback)</h3>
  <p>生物通過儀式、戰鬥與親密活動釋放的情慾魔力被根系吸收,形成閉環。</p>

  <blockquote>關鍵平衡:若情慾魔力過低,大陸將進入「枯萎期」;若過高,則引發「狂亂期」——紀元2450的「<a class="wl" href="#history">月之狂亂</a>」
  即為狂亂期失控的著名案例。</blockquote>

  <h2>魔法分類</h2>
  <ul>
    <li><b>情慾系</b>(最普遍):通過親密接觸與情感連結發動,強度與情緒強度正相關。</li>
    <li><b>元素系</b>:火(炙炎)、月光(月影)、暗影(深淵)、夢境(花海)、水(深海)。</li>
    <li><b>共鳴系</b>:跨種族互動時最容易出現,可產生混合魔法效果。</li>
  </ul>
  <p>多數種族透過「實踐儀式」(結合冥想的傳統修煉)學習魔法,年輕個體學習速度最快。</p>

  <h2>特殊現象</h2>
  <ul>
    <li><b>魔力潮汐</b>(每年一次):全大陸魔力提升300%,各種族進入繁殖高峰。</li>
    <li><b>世界樹開花季</b>(每7年):世界樹開出巨大發光花朵,跨域遷徙達到頂峰,詳見<a class="wl" href="#migration">跨域遷徙路線</a>。</li>
  </ul>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#世界樹</span><span class="tag">#魔力潮汐</span><span class="tag">#月之狂亂</span>
  </div>
  `
},

'pathfinders-hold':{
  title:'拓境城', category:'地理與政治', domain:null, tags:['人族','雲隙荒境','拼接建築','拓境行會聯合'],
  alt:"Pathfinder's Hold · 拓境者的家",
  infobox:{'位置':'<a class="wl" href="#unclaimed-territories">雲隙荒境</a>中心','建立者':'<a class="wl" href="#notable-figures">凱恩·灰旅</a>','建築風格':'拼接建築(Patchwork Architecture)','人口組成':'以<a class="wl" href="#race-human">人族</a>為主,兼容各族流浪者'},
  body:`
  <p>拓境城(Pathfinder's Hold)座落於<a class="wl" href="#unclaimed-territories">雲隙荒境</a>中心,是<a class="wl" href="#race-human">人族</a>
  墜入艾瑟瑞亞後建立的第一座、也是唯一一座正式聚落,如今是<b>拓境行會聯合</b>的總部所在。與五大生態域那些「由魔力自然生長而成」的
  建築截然不同,拓境城是一座徹頭徹尾靠雙手一磚一瓦「蓋」出來的城市。</p>

  <h2>環境</h2>
  <p>雲隙荒境本身是介於<a class="wl" href="#domain-ember">炙炎山脈</a>與<a class="wl" href="#domain-lunar">月影古林</a>之間的破碎浮空礫石帶,
  地貌破碎、資源匱乏,終年壟罩在雲海濕氣與碎裂浮島的陰影之下。拓境城便建於此地最大、最穩固的一塊浮空礁岩之上,四周散布著
  歷代雲海渡口失事的殘骸——這些殘骸後來反倒成了拓境城最主要的建材來源。</p>

  <h2>建築:拼接建築 (Patchwork Architecture)</h2>
  <p>由於沒有任何原生元素親和力可以「引導」建材生長,人族只能因地制宜、就地取材,將五域各自的建築工法拼湊挪用——
  牆體常見熔鑄黑曜石殘塊與珊瑚防水塗層混用,屋頂則援用月影古林式的活木塑形殘枝作骨架,再覆上打撈自雲舟殘骸的金屬板。
  這種毫無「純粹」可言的混搭風格,反而成了人族引以為傲的美學:每一棟建築都是一部濃縮的跨域貿易史。</p>

  <h3>代表建物</h3>
  <ul>
    <li><b>拓境集會所</b>——拓境行會聯合的議事與行政中心,外觀由五種材質拼接而成,是全城最大的建築。</li>
    <li><b>羅盤塔(Compass Tower)</b>——收藏<a class="wl" href="#legendary-artifacts">拓境羅盤</a>原件的高塔,同時也是航道規劃與雲舟調度中心。</li>
    <li><b>破帆廣場</b>——以歷代雲海渡口失事雲舟的殘破船帆搭建頂棚的中央市集廣場,五域商品在此交易流通。</li>
    <li><b>灰旅紀念柱</b>——紀念創城者<a class="wl" href="#notable-figures">凱恩·灰旅</a>的石柱,柱身刻有最初抵達此地的年份與傳說中三種起源說法的簡短銘文。</li>
  </ul>

  <h2>居民組成</h2>
  <p>拓境城雖以人族為主體,卻是全大陸種族組成最混雜的聚落——舉凡在原生政體中因階級、信仰或血統而遭邊緣化的個體
  (例如不受<a class="wl" href="#race-lilith">魅魔</a>階級制度青睞的低階學徒、拒絕遵循<a class="wl" href="#race-lunarfang">狼女</a>
  部落傳統的年輕戰士),都可能輾轉流落至此,使拓境城逐漸發展出一種「不問出身、只看本事」的邊境城鎮文化,
  也讓它成為五域眼中「規矩最少、最難掌控」的地方。</p>

  <h2>行會結構</h2>
  <p><b>拓境行會聯合</b>下轄三大子公會:<b>商隊行會</b>(管理跨域雲舟貿易)、<b>工匠公會</b>(負責拼接建築的營造與拓境羅盤的量產)、
  <b>嚮導公會</b>(培訓熟悉<a class="wl" href="#transit-network">大陸交通網絡</a>三種路徑的領航員與外交隨行人員)。三會共同推舉現任會長
  <a class="wl" href="#notable-figures">艾莉諾·拓境</a>統籌對外事務。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#人族</span><span class="tag">#雲隙荒境</span><span class="tag">#拓境羅盤</span><span class="tag">#凱恩灰旅</span>
  </div>
  `
},

    <tr><td><a class="wl" href="#nation-petalconcord">花瓣聯盟</a></td><td><a class="wl" href="#nation-rootreach">根都</a></td><td>密切</td><td>同域共治,共同守護世界樹周邊事務</td></tr>
    <tr><td><a class="wl" href="#nation-starisles">十二星島盟</a></td><td>五域</td><td>中立調停</td><td>超然立場,常受邀作第三方仲裁</td></tr>

    <tr><td><a class="wl" href="#nation-rootreach">根都</a></td><td>全體政體</td><td>絕對中立</td><td>公認聖地,兼任跨域爭端仲裁者</td></tr>
    <tr><td><a class="wl" href="#pathfinders-hold">拓境行會聯合</a></td><td>全體政體</td><td>有用但保留</td><td>各域普遍雇用其商隊,但黑淵母邦與部分保守狼女部落戒心較重</td></tr>
  </table>

  <h2>當前最大裂痕</h2>
  <ul>
    <li><b>黑淵母邦內部</b>——<a class="wl" href="#pantheon-faith">永夜真理教</a>與官方<a class="wl" href="#pantheon-faith">世界樹信仰</a>的正統/異端之爭尚未平息。</li>
    <li><b>永夜深淵政治不穩</b>——<a class="wl" href="#unclaimed-territories">影裔殘部</a>持續盤據未圖之境,是唯一未被任何政體實際控制的敵對勢力。</li>
    <li><b>人族身分未定</b>——<a class="wl" href="#race-human">人族</a>雖被普遍雇用,卻始終未被完全接納為「艾瑟瑞亞原生」的一員。</li>
  </ul>

    <tr><td>灰燼鳳蝶</td><td>中階</td><td>翅膀由類似灰燼的輕質鱗片構成,飛行時會留下短暫的火星軌跡</td></tr>
    <tr><td>熔岩角獸</td><td>頂級掠食者(<a class="wl" href="#race-dragonkin">龍女</a>/炎狐之下)</td><td>體表覆蓋硬化熔岩殼,雙角能噴發高溫氣體驅敵</td></tr>

'creation-myth':{
  title:'創世神話', category:'神話與信仰', domain:null, tags:['創世','神話','世界樹','太初'],
  alt:'The First Chord · 太初之音',
  infobox:{'時期':'紀元0以前(不可考)','核心概念':'太初二力、世界樹之夢','官方版本傳承者':'<a class="wl" href="#race-dryads">樹精</a>根都學院'},
  body:`
  <p>太初之時,無天無地,唯有「太虛」——絕對的空無。太虛之中沒有時間,沒有意識,只漂浮著兩股尚未成形的原始傾向。
  這是艾瑟瑞亞最古老、也最難以驗證的一段敘事,卻是理解整座大陸魔力本質的關鍵。</p>

  <h2>太初二力</h2>
  <p>傳說太虛之中蘊藏著兩股彼此對立又彼此渴求的原始傾向:</p>
  <ul>
    <li><b>生潮(Life-Tide)</b>——不斷擴張、渴望存在、渴望被感知的衝動。</li>
    <li><b>慾焰(Desire-Ember)</b>——渴望連結、渴望觸碰、渴望不再孤獨的衝動。</li>
  </ul>
  <p>兩者本無形無質,直到某個無法考據的剎那彼此共鳴、碰撞,發出「太初之音(The First Chord)」——已知最早的「存在」瞬間。
  <a class="wl" href="#creature-titan">世界樹</a>的種子,便誕生於那道共鳴的餘燼之中。</p>

  <h2>世界樹之夢</h2>
  <p>種子在太虛中漂流無盡歲月,終於在雲海深處尋得立足之地,生根、抽芽,長成後來的艾瑟瑞姆。世界樹並非只是被動生長的植物——
  傳說它在生長過程中作起了長夢,而夢中的每一個面向,都化作了實際存在的疆域:</p>
  <ul>
    <li>它夢見自身年輕時的狂熱與衝動,那份熾熱凝結成<a class="wl" href="#domain-ember">炙炎山脈</a>。</li>
    <li>它夢見自己初次意識到「渴望」為何物時的悵然,那份悵然化為銀光,流淌成<a class="wl" href="#domain-lunar">月影古林</a>。</li>
    <li>它夢見自己害怕孤獨、害怕被遺忘的暗面,那份恐懼沉澱成<a class="wl" href="#domain-abyss">永夜深淵</a>。</li>
    <li>它夢見自己尚未實現、無數種可能的未來,那些幻想綻放成<a class="wl" href="#domain-bloom">晶夢花海</a>。</li>
    <li>它夢見自己終於平靜下來、與萬物和解的心境,那份寧靜匯聚成<a class="wl" href="#domain-trench">深海裂隙</a>。</li>
  </ul>

  <h2>眾生的誕生</h2>
  <p>世界樹並不願獨自作夢。祂將自身夢境的碎片賦予意識與形體,使之成為能在各自疆域中生活、思考、渴望的種族。這正是為何艾瑟瑞亞的
  每個種族,天生便與<a class="wl" href="#magic-system">情慾與渴望的魔力</a>如此親近——他們本質上正是世界樹渴望本身的具象化,
  而<a class="wl" href="#magic-system">魔力循環系統</a>的「回饋」階段,其實正是萬物將這份渴望歸還給作夢者的過程。</p>

  <blockquote>「我們不是世界樹創造的僕從,我們是祂尚未做完的夢的一部分。」——根都學院古諺</blockquote>

  <h2>眾說紛紜的異本</h2>
  <p>雖然「世界樹之夢」是各域最普遍接受的官方版本,不同種族仍流傳著各自的異本創世神話,從未被證實或推翻,反而成為各族信仰差異、
  乃至外交摩擦的深層根源之一:</p>
  <ul>
    <li><b><a class="wl" href="#race-dragonkin">龍女</a>異本</b>——相信泰坦古樹其實孵化自一顆墜落太虛的巨大火卵,五域不過是卵殼碎片落地後各自演化而成。</li>
    <li><b><a class="wl" href="#race-lilith">魅魔</a>異本</b>——相信始祖<a class="wl" href="#creature-lilithshadow">莉莉絲之影</a>早於世界樹存在,是她以誘惑喚醒了沉睡的種子,
    世界樹的第一次萌芽其實是回應她的呼喚。</li>
    <li><b><a class="wl" href="#race-drow">黑暗精靈</a>異本</b>——主張光明只是暫時的意外,永夜才是太虛真正的本質,世界樹的誕生只是遲早會被黑暗重新吞沒的插曲。</li>
  </ul>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#世界樹</span><span class="tag">#魔力循環</span><span class="tag">#創世之刻</span><span class="tag">#人族</span><span class="tag">#信仰體系</span>
  </div>
  `
},
'pantheon-faith':{
  title:'信仰體系', category:'神話與信仰', domain:null, tags:['信仰','教團','異端','聖地'],
  alt:'Faiths & Cults of Aetheria',
  infobox:{'官方信仰':'世界樹信仰(泛大陸)','教廷/聖地':'<a class="wl" href="#unclaimed-territories">根都</a>','已知異端':'永夜真理教'},
  body:`
  <p>艾瑟瑞亞的信仰體系建立在<a class="wl" href="#creation-myth">創世神話</a>之上,以泛大陸共通的「世界樹信仰」為主流,
  但各域仍各自發展出對在地傳奇生物的崇拜,甚至孕育出被視為異端的分支教派。</p>

  <h2>世界樹信仰 (The Aetherium Faith)</h2>
  <p>幾乎所有種族都以某種形式敬奉<a class="wl" href="#creature-titan">世界樹艾瑟瑞姆</a>,將其視為萬物魔力與生命的根源。
  信仰的核心教義並非空談——<a class="wl" href="#magic-system">魔力循環系統</a>的五個階段本身就被當作神聖的儀軌:
  「回饋」階段尤其被詮釋為信眾將自身的渴望與愛慾獻還給作夢者的神聖行為。</p>
  <p>教團核心為<b>護根者(Rootwardens)</b>,以<a class="wl" href="#race-dryads">樹精</a>為主要成員,總部設於全大陸公認的中立聖地
  <a class="wl" href="#unclaimed-territories">根都</a>。</p>
  <p><b>信仰曆法</b>:每年一度的<a class="wl" href="#magic-system">魔力潮汐</a>對應年度慶典「潮盈節」;每七年一度的
  <a class="wl" href="#magic-system">世界樹開花季</a>則是最神聖的朝聖盛會,全大陸信眾不分種族齊聚根都朝拜。</p>

  <h2>各域在地信仰</h2>
  <table class="wiki-table">
    <tr><th>域</th><th>信仰對象</th><th>特色</th></tr>
    <tr><td><a class="wl" href="#domain-ember">炙炎山脈</a></td><td><a class="wl" href="#creature-starfall">星滅龍王</a>信仰</td><td><a class="wl" href="#race-dragonkin">龍女</a>視其為天穹守護者,遠行與遷徙前必先祈願</td></tr>
    <tr><td><a class="wl" href="#domain-lunar">月影古林</a></td><td>白狼之母信仰</td><td>對銀月狼靈的祖靈崇拜,「月之狂獵」途中會向其祈求指引</td></tr>
    <tr><td><a class="wl" href="#domain-abyss">永夜深淵</a>(魅魔)</td><td>莉莉絲教團</td><td>對始祖<a class="wl" href="#creature-lilithshadow">莉莉絲之影</a>的直接崇拜,與王室世系高度重疊——女王即被視為莉莉絲意志的現世化身</td></tr>
    <tr><td><a class="wl" href="#domain-abyss">永夜深淵</a>(黑暗精靈)</td><td>永夜真理教</td><td>主張永夜才是太虛本質,光明只是暫時意外,被護根者視為異端(詳見下方)</td></tr>
    <tr><td><a class="wl" href="#domain-bloom">晶夢花海</a></td><td><a class="wl" href="#creature-dreamweaver">夢境織女</a>信仰</td><td>花精與樹精共同的夢境神諭傳統,以解讀夢兆聞名</td></tr>
    <tr><td><a class="wl" href="#domain-trench">深海裂隙</a></td><td>光歌鯨/<a class="wl" href="#creature-abysssovereign">永眠海皇</a>信仰</td><td><a class="wl" href="#race-sirens">海妖</a>於光歌鯨神殿舉行歌詠祭儀</td></tr>
  </table>

  <h2>異端與宗教張力:永夜真理教</h2>
  <p>永夜真理教承襲<a class="wl" href="#race-drow">黑暗精靈</a>創世異本的核心主張——永夜才是太虛真正的本質,世界樹的光明終將被黑暗重新吞沒。
  此教派在黑淵母邦內部逐漸壯大,被根都護根者視為潛在威脅。部分學者甚至懷疑,紀元5890「<a class="wl" href="#history">影之叛亂</a>」
  背後不僅是政治奪權,更是一場被真理教激進派煽動的宗教叛變——正統與異端的角力,至今仍是永夜深淵政治的暗流,
  也讓<a class="wl" href="#unclaimed-territories">影裔殘部</a>的真實動機蒙上一層宗教陰影。</p>

  <h2>當代預言</h2>
  <blockquote>「當第八次開花之時,沉睡之影將甦醒,渴望終將決定選擇。」——根都護根者間流傳的未證實預言</blockquote>
  <p>多數學者認為這只是對下一次<a class="wl" href="#magic-system">世界樹開花季</a>(約紀元6300前後)的模糊警示,
  但也有人相信這暗指<a class="wl" href="#unclaimed-territories">影裔殘部</a>、<a class="wl" href="#legendary-artifacts">闇蝕之心</a>
  或永夜真理教即將有所行動——這則預言尚未應驗,是「新生代」故事線中懸而未決的伏筆。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#創世神話</span><span class="tag">#根都</span><span class="tag">#永夜真理教</span><span class="tag">#影裔殘部</span>
  </div>
  `
},

history:{
  title:'歷史大事記', category:'歷史', domain:null, tags:['歷史','紀元','時間軸'],
  alt:'Chronicle of the Ages',
  body:`
  <p>艾瑟瑞亞的歷史以「紀元」計數,從創世之刻延續至今日的第6230紀元。</p>
  <div class="timeline">
    <div class="tl-item"><div class="tl-era">紀元 0</div><div class="tl-title">創世之刻</div><p>世界樹<a class="wl" href="#creature-titan">艾瑟瑞姆</a>從虛空中誕生,大陸浮上天空。完整緣由詳見<a class="wl" href="#creation-myth">創世神話</a>。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 850</div><div class="tl-title">第一次魔力崩壞</div><p>各域對魔力晶石的開採在此時達到頂峰,遠超世界樹的自然恢復速度,終致「枯萎災變」爆發,世界樹進入長達三百餘年的沉睡,
    大陸<a class="wl" href="#magic-system">魔力循環</a>陷入長期紊亂。也正是在這段動盪期間,現實帷幕出現裂縫,<a class="wl" href="#race-human">人族</a>自此墜入艾瑟瑞亞,
    成為大陸上最年輕的種族。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 1200</div><div class="tl-title">天穹之戰</div><p>世界樹沉睡導致的魔力外洩驚動了棲居雲海高處的天使族,雙方爆發艾瑟瑞亞史上首場跨界戰爭。龍族與天使族大戰,
    龍血散落各地,形成多種混血種族,包括<a class="wl" href="#race-stardust">星塵龍女</a>一系的分化起源。完整戰役經過詳見
    <a class="wl" href="#event-sky-war">天穹之戰</a>專頁。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 1450</div><div class="tl-title">黑淵母邦建立</div><p>開國暗后陰紗統一永夜深淵分散的黑暗精靈部族,建立<a class="wl" href="#nation-umbral">黑淵母邦</a>,
    某種程度上是對莉莉絲降臨後契約王朝崛起的回應與制衡,完整世系詳見<a class="wl" href="#royal-lineages">王室譜系</a>。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 2450</div><div class="tl-title">月之狂亂</div><p>第一次大規模<a class="wl" href="#magic-system">魔力潮汐</a>失控,<a class="wl" href="#race-lunarfang">狼女</a>與
    <a class="wl" href="#race-kitsune">狐女</a>進入長達三年的狂熱期,<a class="wl" href="#nation-lunarfang">月伏部落聯盟</a>幾乎因此瓦解,
    最終在當時月牙首領的強力領導下重整秩序。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 2900</div><div class="tl-title">拓境行會獲正式承認</div><p><a class="wl" href="#race-human">人族</a>拓境行會聯合與各域簽訂通商特許,
    首次獲得跨域承認為中立商業實體,自此<a class="wl" href="#pathfinders-hold">拓境城</a>的雲舟商隊得以合法穿梭於五域之間。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 3120</div><div class="tl-title">莉莉絲降臨</div><p><a class="wl" href="#creature-lilithshadow">魅魔始祖莉莉絲之影</a>現身於永夜深淵最幽暗處,
    以無可抗拒的魅力與智慧收攏原本四散的「夜語者」,建立<a class="wl" href="#nation-covenant">契約王朝</a>與階級秩序。完整經過詳見
    <a class="wl" href="#event-lilith-advent">莉莉絲降臨</a>專頁。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 3780</div><div class="tl-title">大交融協定</div><p>五域代表在世界樹下簽訂具魔法強制力的和平協定,鍛造五域晶約為實體見證,開啟跨域貿易時代,
    <a class="wl" href="#nation-rootreach">根都</a>自此確立為五域共同承認的中立聖地。完整經過詳見<a class="wl" href="#event-grand-concord">大交融協定</a>專頁,
    貿易細節見<a class="wl" href="#economy">經濟與貿易</a>。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 4200</div><div class="tl-title">永夜真理教興起</div><p><a class="wl" href="#nation-umbral">黑淵母邦</a>內部異端教派「永夜真理教」逐漸壯大,
    主張永夜才是太虛真正的本質,首次被<a class="wl" href="#pantheon-faith">護根者</a>列為觀察對象——這場醞釀近1700年的宗教運動,
    最終在紀元5890釀成大禍。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 5120</div><div class="tl-title">第二次開花季</div><p>世界樹大規模開花,引發全大陸種族大遷徙與混血高峰,是繼創世以來規模最大的一次跨域盛會,
    也讓<a class="wl" href="#pantheon-faith">世界樹信仰</a>的朝聖傳統更加鞏固。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 5890</div><div class="tl-title">影之叛亂</div><p>永夜真理教激進派串聯影魅,試圖闖入根都奪取世界樹之淚並以闇蝕之心引發大陸級枯萎期。
    熔焰、契約、黑淵三大君主罕見聯合出兵鎮壓,但闇蝕之心最終下落不明。完整經過詳見<a class="wl" href="#event-shadow-rebellion">影之叛亂</a>專頁。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 6180</div><div class="tl-title">妃嵐即位</div><p><a class="wl" href="#nation-pyraxis">熔焰王朝</a>第38代女王妃嵐加冕即位,是「新生代」年輕統治者崛起的代表性事件,
    完整世系詳見<a class="wl" href="#royal-lineages">王室譜系</a>。</p></div>
    <div class="tl-item"><div class="tl-era">紀元 6230 · 當前</div><div class="tl-title">新生代</div><p>年輕混血種族崛起,傳統與革新衝突加劇,是故事現今所處的時代。<a class="wl" href="#unclaimed-territories">影裔殘部</a>盤據的
    未圖之境,亦成為當代政治張力的主要來源。</p></div>
  </div>
  `
},

language:{
  title:'語言與文字系統', category:'語言與經濟', domain:null, tags:['語言','文字','命名慣例','詞根'],
  alt:'Languages, Scripts & Naming Conventions',
  body:`
  <p>艾瑟瑞亞存在一種通用語,以及各種族各具特色的文字系統與命名慣例——後者甚至能從一個人名的音韻,粗略推斷其種族血統。</p>

  <h2>通用語</h2>
  <p><b>以太通用語(Aetherian Common)</b>——由世界樹魔力直接傳授,不經自然語言演化,因此沒有特定的語音偏好,較容易學習,
  是跨域貿易與外交的共同語言。</p>

  <h2>種族文字系統</h2>
  <table class="wiki-table">
    <tr><th>種族</th><th>文字名稱</th><th>特色</th></tr>
    <tr><td><a class="wl" href="#race-dragonkin">龍族</a></td><td>火焰符文</td><td>刻在金屬或岩石上會微微發熱</td></tr>
    <tr><td><a class="wl" href="#race-kitsune">狐族</a></td><td>幻夢卷軸文字</td><td>會隨閱讀者心情改變含義</td></tr>
    <tr><td><a class="wl" href="#race-lunarfang">狼族</a></td><td>月影爪痕</td><td>以爪痕形式刻在樹皮或石頭上</td></tr>
    <tr><td><a class="wl" href="#race-lilith">魅魔</a></td><td>慾望契約文</td><td>簽署後會產生輕微快感</td></tr>
    <tr><td><a class="wl" href="#race-drow">黑暗精靈</a></td><td>晶石脈動文</td><td>需要魔力共鳴才能閱讀</td></tr>
    <tr><td><a class="wl" href="#race-dryads">樹精</a></td><td>年輪文</td><td>刻於年輪之中,需砍開樹幹才能閱讀,僅施行於已故者</td></tr>
    <tr><td><a class="wl" href="#race-bloomsprites">花精</a></td><td>露光壓紋</td><td>以晨露壓印於花瓣之上,須於一日內讀完,否則隨露水蒸發而消失</td></tr>
    <tr><td><a class="wl" href="#race-stardust">星塵龍女</a></td><td>星軌刻紋</td><td>以水晶碎片排列出星座構型,非線性書寫,依「星形」而非行序閱讀</td></tr>
    <tr><td><a class="wl" href="#race-sirens">海妖</a></td><td>聲紋語</td><td>無固定視覺文字,以「歌形」刻印於共鳴貝板,遇魔力觸碰會重播原聲</td></tr>
    <tr><td><a class="wl" href="#race-human">人族</a></td><td>拓境速記</td><td>改編自以太通用語字母的簡化實用書寫系統,無神秘性質,純為貿易記帳與航道紀錄設計</td></tr>
  </table>
  <p><b>書寫媒介</b>:魔力水晶、發光樹葉、夢境絲綢、熔岩玻璃。</p>

  <h2>命名慣例與詞根</h2>
  <p>各種族的個人命名皆帶有鮮明的音韻特徵,通曉此道者往往能單憑名字的發音,推測出對方的種族與血統背景。</p>
  <table class="wiki-table">
    <tr><th>種族</th><th>語音特徵</th><th>常見詞根</th><th>詞根意涵</th><th>範例</th></tr>
    <tr><td><a class="wl" href="#race-dragonkin">龍女</a></td><td>短促爆破音,母音開放響亮</td><td>Ign-/Igni- ・ Vyr- ・ Fey-</td><td>火焰 ・ 熾盛 ・ 輝耀</td><td>伊格妮絲(Ignis)・微拉(Vyra)・妃嵐(Feyla)</td></tr>
    <tr><td><a class="wl" href="#race-lilith">魅魔</a></td><td>流音與齒擦音交織,柔和誘人</td><td>Lil-/Lith- ・ Ves-</td><td>起源/契約 ・ 夜色/誓言</td><td>莉莉絲(Lilith)・薇夏(Vesha)</td></tr>
    <tr><td><a class="wl" href="#race-drow">黑暗精靈</a></td><td>硬子音叢,音節冷硬簡短</td><td>Umbr- ・ Cy-</td><td>陰影 ・ 寒晶</td><td>陰紗(Umbrys)・賽妮絲(Cyanessa)</td></tr>
    <tr><td><a class="wl" href="#race-lunarfang">狼女</a></td><td>短音節,常以喉音或顫音收尾</td><td>Sil- ・ -via/-yia</td><td>銀色 ・ 狼嚎尾韻</td><td>希爾薇亞(Silvyia)</td></tr>
    <tr><td><a class="wl" href="#race-bloomsprites">花精</a>/<a class="wl" href="#race-stardust">星塵龍女</a></td><td>開放母音,輕盈綿長</td><td>——(多以自然詩意稱號取代本名)</td><td>依季節、星象或花語命名</td><td>「春語」・「寒霜」</td></tr>
    <tr><td><a class="wl" href="#race-sirens">海妖</a></td><td>流音(l/r)為主,音節綿延如水波</td><td>Cora- ・ -lie</td><td>珊瑚/回響尾韻</td><td>珂拉莉(Coralie)</td></tr>
    <tr><td><a class="wl" href="#race-human">人族</a></td><td>無特定詞根規則,沿用故土平實命名習慣</td><td>常見以地貌、旅程或職業構成姓氏</td><td>如 Greytrail(灰旅)= 灰色的旅途</td><td>凱恩·灰旅(Kane Greytrail)・艾莉諾(Eleanor)</td></tr>
  </table>
  <p>此表亦可作為創作新角色時的命名參考——同一血統的角色名若遵循相同詞根規律,能強化種族辨識度與世界一致性。</p>

  </div>
  `
},

  <h2>通貨</h2>

'transit-network':{
  title:'大陸交通網絡', category:'地理與政治', domain:null, tags:['地理','交通','雲海','貿易路線'],
  alt:'Continental Transit Network',
  body:`
  <p>艾瑟瑞亞是浮空大陸,五大生態域之間並非單純陸路相連,而是依賴三種特殊交通方式往來,共同構成整座大陸的交通骨幹。</p>

  <h2>三大交通方式</h2>
  <h3>雲海渡口 (Cloudsea Crossings)</h3>
  <p>部分域與域邊界懸浮於無盡雲海之上,居民以馴養的浮空生物(如焰翼蜂鳥的巨型近親、光歌鯨的表親「雲鯨」)牽引「雲舟」渡海往來,
  是最普及的跨域交通方式。由於不受任何單一域魔力親和限制,<a class="wl" href="#race-human">人族</a>逐漸壟斷了大部分雲舟商隊的操作與維護工作。</p>
  <h3>根域隧道 (Rootbound Tunnels)</h3>
  <p>世界樹<a class="wl" href="#creature-titan">艾瑟瑞姆</a>根系延伸出的天然地下通道,連接<a class="wl" href="#domain-abyss">永夜深淵</a>
  與其他域的地底部分,是最快速但最危險的路徑,需通過黑暗精靈或魅魔領地許可方可通行。</p>
  <h3>天穹古道 (Skyward Old Roads)</h3>
  <p>傳說由<a class="wl" href="#creature-starfall">星滅龍王</a>時代遺留的古老飛行航道,如今由<a class="wl" href="#race-stardust">星塵龍女</a>
  與部分<a class="wl" href="#race-dragonkin">龍女</a>貴族維護,僅限有翼種族或乘騎飛龍者使用。</p>

  <h2>已知具名貿易路線</h2>
  <table class="wiki-table">
    <tr><th>路線</th><th>連接域</th><th>主要交通方式</th></tr>
    <tr><td>火月之路</td><td><a class="wl" href="#domain-ember">炙炎山脈</a> ↔ <a class="wl" href="#domain-lunar">月影古林</a></td><td>雲海渡口</td></tr>
    <tr><td>夢淵之路</td><td><a class="wl" href="#domain-bloom">晶夢花海</a> ↔ <a class="wl" href="#domain-abyss">永夜深淵</a></td><td>根域隧道,由夢境邊境守望者巡守</td></tr>
  </table>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#世界樹</span><span class="tag">#經濟與貿易</span><span class="tag">#未歸屬地帶</span>
  </div>
  `
},
'unclaimed-territories':{
  title:'未歸屬地帶', category:'地理與政治', domain:null, tags:['地理','邊境','影裔殘部'],
  alt:'Unclaimed Territories',
  body:`
  <p>並非艾瑟瑞亞全境都被五大政體所轄。域與域交界處存在大片「未歸屬地帶」,是走私者、流亡者與傳說生物的棲身之所,
  也是當前紀元「新生代」政治不穩定的主要源頭。</p>

  <h2>雲隙荒境 (Cloudrift Wastes)</h2>
  <p>介於<a class="wl" href="#domain-ember">炙炎山脈</a>與<a class="wl" href="#domain-lunar">月影古林</a>之間的破碎浮空礫石帶,
  常見雲海渡口失事的殘骸,亦是荒血部與流亡龍族偶爾藏匿之處。紀元850前後,<a class="wl" href="#race-human">人族</a>墜入此地並落地生根,
  於此建立起大陸上唯一由人族主導的據點——<a class="wl" href="#pathfinders-hold">拓境城(Pathfinder's Hold)</a>,如今是
  <b>拓境行會聯合</b>的總部所在。</p>

  <h2>未圖之境</h2>
  <p><a class="wl" href="#domain-abyss">永夜深淵</a>回聲深坑以下的未知領域,官方地圖上刻意留白。傳說中,紀元5890「
  <a class="wl" href="#history">影之叛亂</a>」失敗後倖存的<b>影裔殘部</b>真正據點便藏匿於此,是契約王朝與黑淵母邦少數
  能達成一致立場的共同威脅。</p>

  <div class="see-also">
    <div class="see-also-title">另見</div>
    <span class="tag">#影之叛亂</span><span class="tag">#永夜深淵</span><span class="tag">#大陸交通網絡</span>
  </div>
  `
},

/* ============================================================
   RENDER
   ============================================================ */
function buildNav(activeId){
  let html = '';
  NAV_ORDER.forEach(group=>{
    html += `<div class="nav-group"><div class="nav-group-title">${group.name}</div>`;
    group.ids.forEach(id=>{
      const p = PAGES[id];
      const dotColor = p.domain ? `background:${DOMAIN_COLOR[p.domain]}` : '';
      html += `<div class="nav-link${id===activeId?' active':''}" onclick="location.hash='${id}'">
        <span class="dot" style="${dotColor}"></span>${p.title}
      </div>`;
    });
    html += `</div>`;
  });
  return html;
}

function buildInfobox(p){
  if(!p.infobox) return '';
  let rows = '';
  for(const [label,val] of Object.entries(p.infobox)){
    rows += `<div class="infobox-row"><div class="infobox-label">${label}</div><div class="infobox-value">${val}</div></div>`;
  }
  return `<div class="infobox"><div class="infobox-head">${p.title}</div>${rows}</div>`;
}

function renderPage(id){
  const p = PAGES[id] || PAGES.home;
  const realId = PAGES[id] ? id : 'home';
  const color = DOMAIN_COLOR[p.domain] || 'var(--gold)';

  document.getElementById('content').innerHTML = `
    <div class="page-eyebrow" style="--domain-color:${color}">${p.category}</div>
    <h1 class="page-title" style="--domain-color:${color}">${p.title}</h1>
    ${p.alt ? `<div class="page-alt">${p.alt}</div>` : ''}
    ${buildInfobox(p)}
    <article style="--domain-color:${color}">${p.body}</article>
  `;
  document.getElementById('topbar').innerHTML = `艾瑟瑞亞百科 <span style="color:var(--ink-dim)">/</span> ${p.category} <span style="color:var(--ink-dim)">/</span> <a href="#${realId}">${p.title}</a>`;
  document.getElementById('nav-tree').innerHTML = buildNav(realId);
  window.scrollTo(0,0);
  document.getElementById('sidebar').classList.remove('open');
}

function routeFromHash(){
  const id = location.hash.slice(1) || 'home';
  renderPage(id);
}
window.addEventListener('hashchange', routeFromHash);
window.addEventListener('DOMContentLoaded', routeFromHash);

/* ============================================================
   SEARCH
   ============================================================ */
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim().toLowerCase();
  if(!q){ searchResults.classList.remove('show'); searchResults.innerHTML=''; return; }
  const matches = Object.entries(PAGES).filter(([id,p])=>{
    return p.title.toLowerCase().includes(q) || (p.tags||[]).some(t=>t.toLowerCase().includes(q)) || (p.alt||'').toLowerCase().includes(q);
  }).slice(0,10);
  if(matches.length===0){
    searchResults.innerHTML = `<div class="sr-item" style="color:var(--ink-dim)">找不到符合的詞條</div>`;
  } else {
    searchResults.innerHTML = matches.map(([id,p])=>`
      <div class="sr-item" onclick="location.hash='${id}'; searchInput_clear()">${p.title}<small>${p.category}</small></div>
    `).join('');
  }
  searchResults.classList.add('show');
});
function searchInput_clear(){ searchInput.value=''; searchResults.classList.remove('show'); }
document.addEventListener('click', (e)=>{
  if(!document.getElementById('search-box').contains(e.target)){ searchResults.classList.remove('show'); }
});
</script>
